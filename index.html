          <div style={{ color: C.faint, fontSize: 13, marginTop: 10, lineHeight: 1.6 }}>GPX/TCXを取り込むと、ペース・心拍・ケイデンス・ストライド・心拍ドリフトを分析します。</div>
        </Panel>
      );
      const cad = runs.filter((r) => r.metrics.avgCadence).map((r) => ({ date: r.date.slice(5), v: r.metrics.avgCadence }));
      const stride = runs.filter((r) => r.metrics.avgStride).map((r) => ({ date: r.date.slice(5), v: r.metrics.avgStride }));
      const eff = runs.filter((r) => r.metrics.paceSec && r.metrics.avgHr).map((r) => ({ date: r.date.slice(5), v: Math.round((1000 / r.metrics.paceSec) / r.metrics.avgHr * 1000) }));
      const decoup = runs.filter((r) => r.metrics.decoupling != null);
      const lastDec = decoup.length ? decoup[decoup.length - 1].metrics.decoupling : null;
      return (
        <Panel>
          <Eyebrow color={C.run}>ランニング・ダイナミクス</Eyebrow>
          {lastDec != null && <div style={{ fontSize: 13, color: C.muted, margin: "8px 0 4px" }}>直近の心拍ドリフト <span style={{ fontFamily: "var(--mono)", color: lastDec <= 5 ? C.good : C.warn, fontWeight: 700 }}>{lastDec}%</span>。{lastDec <= 5 ? "後半も心拍が安定。" : "後半に心拍が上振れ。"}</div>}
          <MiniLine title="平均ケイデンス (spm)" data={cad} color={C.run} />
          <MiniLine title="平均ストライド (m/歩)" data={stride} color={C.hike} fmt={(v) => v} />
          <MiniLine title="エアロビック効率 (速度/心拍)" data={eff} color={C.info} />
        </Panel>
      );
    }

    function MiniLine({ title, data, color, fmt }) {
      if (data.length < 2) return null;
      return (
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 11.5, color: C.faint, marginBottom: 2 }}>{title}</div>
          <div style={{ height: 110 }}><ResponsiveContainer><LineChart data={data} margin={{ top: 6, right: 8, left: -14, bottom: 0 }}>
            <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="date" tick={{ fill: C.faint, fontSize: 9 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis domain={["dataMin-2", "dataMax+2"]} tick={{ fill: C.faint, fontSize: 9 }} tickLine={false} axisLine={false} width={34} tickFormatter={fmt} />
            <Tooltip contentStyle={chartTip} /><Line type="monotone" dataKey="v" stroke={color} strokeWidth={2} dot={{ r: 2, fill: color }} />
          </LineChart></ResponsiveContainer></div>
        </div>
      );
    }

    function RunDistribution({ entries }) {
      const data = useMemo(() => { const acc = {}; let easy = 0, hard = 0; entries.filter((e) => e.sport === "run" && e.runType).forEach((e) => { acc[e.runType] = (acc[e.runType] || 0) + 1; if (HARD_RUN.has(e.runType)) hard++; else if (e.runType !== "その他") easy++; }); return { rows: Object.keys(acc).map((k) => ({ type: k, n: acc[k] })), easy, hard }; }, [entries]);
      if (data.rows.length === 0) return null;
      const easyPct = data.easy + data.hard ? Math.round((data.easy / (data.easy + data.hard)) * 100) : 0;
      return (
        <Panel>
          <Eyebrow color={C.run}>ランニング — 強度分布（種別）</Eyebrow>
          <div style={{ fontSize: 13, color: C.muted, margin: "8px 0 12px" }}>イージー比率 <span style={{ fontFamily: "var(--mono)", color: easyPct >= 75 ? C.good : C.warn, fontWeight: 700 }}>{easyPct}%</span>。</div>
          <div style={{ height: 130 }}><ResponsiveContainer><BarChart data={data.rows} margin={{ top: 4, right: 4, left: -22, bottom: 0 }}>
            <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="type" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} allowDecimals={false} />
            <Tooltip contentStyle={chartTip} cursor={{ fill: C.raised }} formatter={(v) => [`${v} 回`, "回数"]} /><Bar dataKey="n" radius={[4, 4, 0, 0]}>{data.rows.map((r, i) => <Cell key={i} fill={HARD_RUN.has(r.type) ? C.bad : C.run} />)}</Bar>
          </BarChart></ResponsiveContainer></div>
        </Panel>
      );
    }

    function HikeAnalysis({ entries }) {
      const hikes = entries.filter((e) => e.sport === "hike");
      const ctr = hikes.filter((e) => e.ctr).sort((a, b) => (a.date < b.date ? -1 : 1)).map((e) => ({ date: e.date.slice(5), ctr: e.ctr }));
      const avg = ctr.length ? Math.round(ctr.reduce((s, x) => s + x.ctr, 0) / ctr.length) : null;
      if (hikes.length === 0) return null;
      return (
        <Panel>
          <Eyebrow color={C.hike}>登山 — コースタイム比</Eyebrow>
          {avg != null ? (<>
            <div style={{ fontSize: 13, color: C.muted, margin: "8px 0 12px" }}>平均 <span style={{ fontFamily: "var(--mono)", color: avg <= 100 ? C.good : C.warn, fontWeight: 700 }}>{avg}%</span>（100%=標準）。</div>
            <div style={{ height: 140 }}><ResponsiveContainer><LineChart data={ctr} margin={{ top: 4, right: 8, left: -16, bottom: 0 }}>
              <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="date" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} width={36} />
              <Tooltip contentStyle={chartTip} formatter={(v) => [`${v}%`, "CT比"]} /><ReferenceLine y={100} stroke={C.line2} strokeDasharray="3 3" /><Line type="monotone" dataKey="ctr" stroke={C.hike} strokeWidth={2} dot={{ r: 2.5, fill: C.hike }} />
            </LineChart></ResponsiveContainer></div>
          </>) : <div style={{ color: C.faint, fontSize: 13, marginTop: 10 }}>コースタイム比を記録すると傾向が見えます。</div>}
        </Panel>
      );
    }

    /* ================================================================== *
     * GOALS
     * ================================================================== */
    const GOAL_METRICS = [
      { k: "run_week_km", label: "週間走行距離", unit: "km", sport: "run" },
      { k: "run_month_km", label: "月間走行距離", unit: "km", sport: "run" },
      { k: "hike_month_elev", label: "月間 獲得標高", unit: "m", sport: "hike" },
      { k: "climb_max_boulder", label: "ボルダー最高グレード", unit: "", sport: "climb" },
      { k: "climb_elo", label: "ボルダーELO", unit: "", sport: "climb" },
      { k: "sessions_30d", label: "30日のセッション数", unit: "回", sport: null },
      { k: "manual", label: "自由目標（手動進捗）", unit: "%", sport: null },
    ];
    const sumKey = (arr, key) => Math.round(arr.reduce((s, e) => s + (e[key] || 0), 0) * 10) / 10;
    function goalCurrent(g, entries) {
      const t = today();
      if (g.metric === "run_week_km") return sumKey(entries.filter((e) => e.sport === "run" && weekStart(e.date) === weekStart(t)), "distance");
      if (g.metric === "run_month_km") return sumKey(entries.filter((e) => e.sport === "run" && monthKey(e.date) === monthKey(t)), "distance");
      if (g.metric === "hike_month_elev") return sumKey(entries.filter((e) => e.sport === "hike" && monthKey(e.date) === monthKey(t)), "elevGain");
      if (g.metric === "climb_max_boulder") { let m = -1; entries.filter((e) => e.sport === "climb").forEach((e) => (e.sends || []).forEach((s) => { if (s.discipline === "boulder" && s.result !== "プロジェクト") m = Math.max(m, s.idx); })); return m; }
      if (g.metric === "climb_elo") return eloSeries(entries, "boulder").rating;
      if (g.metric === "sessions_30d") return entries.filter((e) => { const d = daysBetween(e.date, t); return d >= 0 && d < 30; }).length;
      if (g.metric === "manual") return g.manual || 0;
      return 0;
    }

    function GoalsTab({ entries, goals, saveGoals }) {
      const [open, setOpen] = useState(false);
      const add = (g) => { saveGoals([...goals, { ...g, id: uid() }]); setOpen(false); };
      const del = (id) => saveGoals(goals.filter((g) => g.id !== id));
      const bump = (id, v) => saveGoals(goals.map((g) => g.id === id ? { ...g, manual: Math.max(0, Math.min(100, (g.manual || 0) + v)) } : g));
      return (
        <div>
          {open ? <GoalForm onSave={add} onCancel={() => setOpen(false)} /> : <Btn kind="solid" color={C.info} onClick={() => setOpen(true)} style={{ width: "100%", padding: 13, marginBottom: 14 }}>＋ 目標を追加</Btn>}
          {goals.length === 0 && !open && <Panel style={{ textAlign: "center", padding: 26 }}><div style={{ color: C.muted, fontSize: 14 }}>目標を立てると、記録から進捗を自動集計します。</div></Panel>}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>{goals.map((g) => <GoalCard key={g.id} g={g} entries={entries} onDelete={() => del(g.id)} onBump={bump} />)}</div>
        </div>
      );
    }

    function GoalCard({ g, entries, onDelete, onBump }) {
      const m = GOAL_METRICS.find((x) => x.k === g.metric);
      const cur = goalCurrent(g, entries);
      const isGrade = g.metric === "climb_max_boulder";
      const curDisp = isGrade ? (cur < 0 ? "—" : V_GRADES[cur]) : cur;
      const tgtDisp = isGrade ? V_GRADES[g.target] : g.target;
      const pct = g.metric === "manual" ? (g.manual || 0) : Math.min(100, Math.round((cur / (g.target || 1)) * 100));
      const col = g.sportColor || C.info;
      const daysLeft = g.deadline ? daysBetween(today(), g.deadline) : null;
      return (
        <Panel style={{ padding: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div><div style={{ fontWeight: 600, fontSize: 15 }}>{g.title || m?.label}</div><div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{m?.label}{daysLeft != null && ` · 残り${daysLeft}日`}</div></div>
            <button onClick={onDelete} style={{ background: "none", border: "none", color: C.faint, cursor: "pointer", fontSize: 18 }}>×</button>
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6, margin: "10px 0 8px" }}>
            <span style={{ fontFamily: "var(--mono)", fontSize: 24, fontWeight: 700, color: col }}>{curDisp}</span>
            <span style={{ color: C.faint }}>/ {tgtDisp} {m?.unit}</span>
            <span style={{ marginLeft: "auto", fontFamily: "var(--mono)", color: pct >= 100 ? C.good : C.muted }}>{pct}%</span>
          </div>
          <div style={{ height: 9, background: C.raised, borderRadius: 6, overflow: "hidden" }}><div style={{ width: `${Math.min(100, pct)}%`, height: "100%", background: pct >= 100 ? C.good : col, borderRadius: 6 }} /></div>
          {g.metric === "manual" && <div style={{ display: "flex", gap: 8, marginTop: 10 }}><Btn kind="ghost" onClick={() => onBump(g.id, -10)} style={{ flex: 1, padding: 8 }}>−10%</Btn><Btn kind="ghost" onClick={() => onBump(g.id, 10)} style={{ flex: 1, padding: 8 }}>＋10%</Btn></div>}
        </Panel>
      );
    }

    function GoalForm({ onSave, onCancel }) {
      const [metric, setMetric] = useState("run_week_km");
      const [title, setTitle] = useState(""); const [target, setTarget] = useState("");
      const [gradeTarget, setGradeTarget] = useState("V5"); const [deadline, setDeadline] = useState("");
      const m = GOAL_METRICS.find((x) => x.k === metric); const isGrade = metric === "climb_max_boulder";
      const submit = () => {
        const g = { metric, title: title.trim(), target: isGrade ? V_GRADES.indexOf(gradeTarget) : Number(target) || 0, deadline: deadline || null, manual: metric === "manual" ? 0 : undefined, sportColor: m.sport ? SPORTS[m.sport].color : C.info };
        if (!isGrade && metric !== "manual" && !target) { alert("目標値を入力してください。"); return; }
        onSave(g);
      };
      return (
        <Panel style={{ marginBottom: 14 }}>
          <Eyebrow color={C.info}>新しい目標</Eyebrow>
          <div style={{ marginTop: 12 }}>
            <Field label="種類"><Select value={metric} onChange={(e) => setMetric(e.target.value)}>{GOAL_METRICS.map((x) => <option key={x.k} value={x.k}>{x.label}</option>)}</Select></Field>
            <Field label="タイトル（任意）"><TextInput value={title} onChange={(e) => setTitle(e.target.value)} placeholder={metric === "manual" ? "例：剱岳 早月尾根 日帰り" : m.label} /></Field>
            {isGrade ? <Field label="目標グレード"><Select value={gradeTarget} onChange={(e) => setGradeTarget(e.target.value)}>{V_GRADES.map((v) => <option key={v}>{v}</option>)}</Select></Field>
              : metric === "manual" ? <div style={{ fontSize: 12, color: C.faint, marginBottom: 12 }}>進捗は0%から開始し、カードのボタンで手動更新します。</div>
              : <Field label={`目標値（${m.unit || "値"}）`}><TextInput inputMode="decimal" value={target} onChange={(e) => setTarget(e.target.value)} /></Field>}
            <Field label="期限（任意）"><TextInput type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} /></Field>
          </div>
          <div style={{ display: "flex", gap: 10 }}><Btn kind="solid" color={C.info} onClick={submit} style={{ flex: 1, padding: 12 }}>追加</Btn><Btn kind="ghost" onClick={onCancel} style={{ padding: 12 }}>キャンセル</Btn></div>
        </Panel>
      );
    }

    /* ================================================================== *
     * DATA MODAL
     * ================================================================== */
    function DataModal({ entries, goals, settings, onClose, saveEntries, saveGoals, saveSettings }) {
      const fileJson = useRef(null), fileCsv = useRef(null), fileTrack = useRef(null);
      const [draft, setDraft] = useState(null);
      const [age, setAge] = useState("");

      const exportJson = () => { const blob = new Blob([JSON.stringify({ entries, goals, settings }, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `cairn-backup-${today()}.json`; a.click(); URL.revokeObjectURL(a.href); };
      const importJson = (e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { try { const d = JSON.parse(r.result); if (d.entries) saveEntries(d.entries); if (d.goals) saveGoals(d.goals); if (d.settings) saveSettings(d.settings); alert("読み込みました。"); onClose(); } catch { alert("JSONを解析できませんでした。"); } }; r.readAsText(f); };
      const importCsv = (e) => { const f = e.target.files[0]; if (!f) return; Papa.parse(f, { header: true, skipEmptyLines: true, complete: (res) => { const mapped = res.data.map(rowToEntry).filter(Boolean); if (!mapped.length) { alert("対応行が見つかりません。"); return; } saveEntries([...mapped, ...entries]); alert(`${mapped.length}件を取り込みました。`); onClose(); } }); };
      const importTrack = (e) => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          const pts = parseTrack(r.result, f.name);
          if (!pts) { alert("GPX/TCXを解析できませんでした。"); return; }
          const m = summarizeTrack(pts);
          setDraft({ filename: f.name, metrics: m });
        };
        r.readAsText(f);
      };
      const saveDraft = (rpe, runType, sport) => {
        const m = draft.metrics;
        const entry = { id: uid(), sport, date: m.date || today(), rpe, duration: m.durMin, distance: m.distKm, elevGain: m.gain, runType: sport === "run" ? runType : undefined, metrics: m, notes: draft.filename };
        saveEntries([entry, ...entries]); setDraft(null); onClose();
      };
      const loadDemo = () => { saveEntries([...demoEntries(), ...entries]); onClose(); };
      const clearAll = () => { if (confirm("すべての記録と目標を削除します。よろしいですか？")) { saveEntries([]); saveGoals([]); onClose(); } };
      const applyAge = () => { const a = Number(age); if (a > 0) saveSettings({ ...settings, maxHr: Math.round(208 - 0.7 * a) }); };

      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "#000000aa", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: C.panel, borderTop: `1px solid ${C.line}`, borderRadius: "18px 18px 0 0", width: "100%", maxWidth: 760, padding: 20, maxHeight: "86vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 17, fontWeight: 700 }}>データと設定</div>
              <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 22, cursor: "pointer" }}>×</button>
            </div>

            {draft ? (
              <TrackConfirm draft={draft} onSave={saveDraft} onCancel={() => setDraft(null)} />
            ) : (<>
              <Eyebrow color={C.run}>アクティビティ取り込み</Eyebrow>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, margin: "10px 0 6px" }}>
                <Btn kind="solid" color={C.run} onClick={() => fileTrack.current.click()} style={{ textAlign: "left" }}>GPX / TCX を取り込む</Btn>
                <input ref={fileTrack} type="file" accept=".gpx,.tcx,.xml" onChange={importTrack} style={{ display: "none" }} />
                <Btn kind="ghost" onClick={() => fileCsv.current.click()} style={{ textAlign: "left" }}>CSV を取り込む（Strava書き出し）</Btn>
                <input ref={fileCsv} type="file" accept=".csv" onChange={importCsv} style={{ display: "none" }} />
              </div>

              <div style={{ height: 1, background: C.line, margin: "14px 0" }} />
              <Eyebrow color={C.info}>心拍ゾーン設定</Eyebrow>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-end", margin: "10px 0 4px" }}>
                <div style={{ flex: 1 }}><Field label="最大心拍数 (bpm)"><TextInput inputMode="numeric" value={settings.maxHr} onChange={(e) => saveSettings({ ...settings, maxHr: Number(e.target.value) || 190 })} /></Field></div>
                <div style={{ flex: 1 }}><Field label="年齢から推定"><div style={{ display: "flex", gap: 6 }}><TextInput inputMode="numeric" value={age} onChange={(e) => setAge(e.target.value)} placeholder="25" /><Btn kind="line" color={C.info} onClick={applyAge} style={{ whiteSpace: "nowrap" }}>計算</Btn></div></Field></div>
              </div>
              <div style={{ fontSize: 11.5, color: C.faint, marginBottom: 14 }}>208 − 0.7 × 年齢（Tanaka式）で最大心拍を推定します。</div>

              <div style={{ height: 1, background: C.line, margin: "4px 0 14px" }} />
              <Eyebrow>バックアップ・その他</Eyebrow>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 10 }}>
                <Btn kind="ghost" onClick={exportJson} style={{ textAlign: "left" }}>バックアップを書き出す（JSON）</Btn>
                <Btn kind="ghost" onClick={() => fileJson.current.click()} style={{ textAlign: "left" }}>バックアップを読み込む（JSON）</Btn>
                <input ref={fileJson} type="file" accept=".json" onChange={importJson} style={{ display: "none" }} />
                <Btn kind="ghost" onClick={loadDemo} style={{ textAlign: "left" }}>デモデータを読み込んで試す</Btn>
                <Btn kind="line" color={C.bad} onClick={clearAll} style={{ textAlign: "left" }}>すべて削除</Btn>
              </div>
              <div style={{ fontSize: 11, color: C.faint, marginTop: 16, lineHeight: 1.5 }}>データはこの端末のlocalStorageに保存されます。機種変更前にJSONバックアップを書き出してください。</div>
            </>)}
          </div>
        </div>
      );
    }

    function TrackConfirm({ draft, onSave, onCancel }) {
      const m = draft.metrics;
      const [rpe, setRpe] = useState(5);
      const [runType, setRunType] = useState("イージー");
      const [sport, setSport] = useState(m.sportGuess || "run");
      const rows = [
        ["日付", m.date || "—"], ["距離", `${m.distKm} km`], ["時間", `${m.durMin} 分`], ["ペース", `${fmtPace(m.paceSec)} /km`],
        ["平均心拍", m.avgHr ? `${m.avgHr} bpm` : "—"], ["最大心拍", m.maxHrPeak ? `${m.maxHrPeak} bpm` : "—"],
        ["ケイデンス", m.avgCadence ? `${m.avgCadence} spm` : "—"], ["ストライド", m.avgStride ? `${m.avgStride} m` : "—"],
        ["獲得標高", `${m.gain} m`], ["心拍ドリフト", m.decoupling != null ? `${m.decoupling} %` : "—"],
      ];
      return (
        <div>
          <Eyebrow color={C.run}>取り込みプレビュー — {draft.filename}</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px", margin: "12px 0 14px" }}>
            {rows.map(([k, v]) => <div key={k} style={{ display: "flex", justifyContent: "space-between", borderBottom: `1px solid ${C.line}`, paddingBottom: 5 }}><span style={{ fontSize: 12.5, color: C.muted }}>{k}</span><span style={{ fontFamily: "var(--mono)", fontSize: 13 }}>{v}</span></div>)}
          </div>
          <Field label="競技"><Select value={sport} onChange={(e) => setSport(e.target.value)}><option value="run">ランニング</option><option value="hike">登山</option></Select></Field>
          <Field label={`RPE — ${rpe}/10`}><input type="range" min="1" max="10" value={rpe} onChange={(e) => setRpe(Number(e.target.value))} style={{ width: "100%", accentColor: C.run }} /></Field>
          {sport === "run" && <Field label="種別"><Select value={runType} onChange={(e) => setRunType(e.target.value)}>{RUN_TYPES.map((t) => <option key={t}>{t}</option>)}</Select></Field>}
          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <Btn kind="solid" color={C.run} onClick={() => onSave(rpe, runType, sport)} style={{ flex: 1, padding: 12 }}>記録に追加</Btn>
            <Btn kind="ghost" onClick={onCancel} style={{ padding: 12 }}>戻る</Btn>
          </div>
        </div>
      );
    }

    function rowToEntry(r) {
      const keys = Object.keys(r);
      const find = (...names) => { const k = keys.find((kk) => names.some((n) => kk.toLowerCase().trim() === n)); return k ? r[k] : undefined; };
      const type = (find("activity type") || "").toLowerCase();
      let sport = null; if (type.includes("run")) sport = "run"; else if (type.includes("hike") || type.includes("walk")) sport = "hike";
      if (!sport) return null;
      const rawDate = find("activity date", "date"); if (!rawDate) return null;
      const date = new Date(rawDate).toISOString().slice(0, 10);
      let dist = parseFloat(find("distance")) || 0; if (dist > 1000) dist /= 1000;
      const secs = parseFloat(find("moving time", "elapsed time")) || 0;
      const duration = Math.round(secs / 60) || 30;
      const elev = Math.round(parseFloat(find("elevation gain")) || 0);
      return { id: uid(), sport, date, rpe: 5, duration, distance: Math.round(dist * 100) / 100, elevGain: elev, runType: sport === "run" ? "イージー" : undefined, notes: "CSV取り込み" };
    }

    function demoEntries() {
      const out = []; const d = (n) => { const x = new Date(); x.setDate(x.getDate() - n); return x.toISOString().slice(0, 10); };
      const buildRun = (km, mn, hrBase) => {
        const avgPace = (mn * 60) / km, N = 80;
        const series = Array.from({ length: N }, (_, i) => {
          const frac = i / (N - 1), wob = Math.sin(i / 6);
          return { km: Math.round(frac * km * 100) / 100, pace: Math.round(avgPace * (1 + 0.06 * wob)), hr: Math.round(hrBase + 12 * Math.sin(i / 9) + frac * 8), ele: Math.round(60 + 45 * Math.sin(frac * Math.PI * 2) + frac * 18) };
        });
        const laps = Array.from({ length: Math.max(1, Math.floor(km)) }, (_, i) => ({ km: i + 1, paceSec: Math.round(avgPace * (1 + 0.05 * Math.sin(i * 1.3))), avgHr: Math.round(hrBase + i * 1.2 + 4 * Math.sin(i)), gain: Math.round(18 + 10 * Math.sin(i * 0.7)) }));
        return { series, laps, hrSeries: series.map((p) => p.hr) };
      };
      const runs = [[2, 8, 50, 7, "イージー", 138, 168, 0.96], [5, 12, 72, 6, "ロング", 142, 172, 1.05], [9, 5, 28, 8, "インターバル", 165, 180, 1.18], [12, 8, 48, 7, "イージー", 136, 170, 0.98], [16, 14, 84, 6, "ロング", 145, 173, 1.10], [20, 6, 32, 8, "テンポ", 158, 178, 1.02], [25, 8, 50, 7, "イージー", 137, 170, 0.95]];
      runs.forEach(([ago, km, mn, rpe, t, hr, cad]) => { const r = buildRun(km, mn, hr); out.push({ id: uid(), sport: "run", date: d(ago), rpe, duration: mn, distance: km, elevGain: km * 12, runType: t, notes: "", metrics: { distKm: km, durMin: mn, gain: km * 12, avgHr: hr, maxHrPeak: hr + 22, avgCadence: cad, avgStride: 0.96, paceSec: (mn * 60) / km, decoupling: t === "ロング" ? 6.5 : 3.2, hrSeries: r.hrSeries, hrSeriesSec: mn * 60, series: r.series, laps: r.laps } }); });
      out.push({ id: uid(), sport: "hike", date: d(7), rpe: 7, duration: 300, distance: 14, elevGain: 1200, packKg: 9, ctr: 92, peak: "燕岳", notes: "" });
      out.push({ id: uid(), sport: "hike", date: d(22), rpe: 8, duration: 420, distance: 18, elevGain: 1700, packKg: 11, ctr: 98, peak: "唐松岳", notes: "" });
      const mk = (g, i, r, tags) => ({ discipline: "boulder", grade: g, idx: i, result: r, tags });
      out.push({ id: uid(), sport: "climb", date: d(3), rpe: 7, duration: 90, notes: "", sends: [mk("V4", 5, "完登(RP)", ["カチ", "垂壁"]), mk("V3", 4, "フラッシュ", ["スラブ", "バランス"]), mk("V5", 6, "プロジェクト", ["強傾斜", "保持力"])] });
      out.push({ id: uid(), sport: "climb", date: d(10), rpe: 8, duration: 100, notes: "", sends: [mk("V4", 5, "フラッシュ", ["スローパー"]), mk("V5", 6, "完登(RP)", ["カチ"]), mk("V4", 5, "プロジェクト", ["ルーフ", "保持力"]), mk("V2", 3, "完登(RP)", ["バランス"])] });
      out.push({ id: uid(), sport: "climb", date: d(18), rpe: 7, duration: 95, notes: "", sends: [mk("V3", 4, "フラッシュ", ["スラブ"]), mk("V5", 6, "完登(RP)", ["ピンチ", "強傾斜"]), mk("V6", 7, "プロジェクト", ["ルーフ"])] });
      return out;
    }

    function EmptyHint() {
      return <Panel style={{ textAlign: "center", padding: 30 }}><div style={{ color: C.muted, fontSize: 14, lineHeight: 1.7 }}>まだデータがありません。<br />「記録」で追加するか、右上「データ」から<br />GPX/TCX取り込み・デモ読み込みができます。</div></Panel>;
    }

    /* ── Mount ───────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- PWA / install logic -->
  <script>
    /* Service Worker registration */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then((reg) => {
          console.log("[CAIRN] SW registered:", reg.scope);
        }).catch((err) => {
          console.warn("[CAIRN] SW failed:", err);
        });
      });
    }

    /* Online / Offline toast */
    const offlineToast = document.getElementById("offline-toast");
    function showOffline() { offlineToast.classList.add("show"); }
    function hideOffline() { offlineToast.classList.remove("show"); }
    window.addEventListener("offline", showOffline);
    window.addEventListener("online", hideOffline);
    if (!navigator.onLine) showOffline();

    /* Install banner (Chrome/Edge/Android) */
    let deferredPrompt = null;
    const banner = document.getElementById("install-banner");
    const installBtn = document.getElementById("install-btn");
    const dismissBtn = document.getElementById("install-dismiss");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.add("show");
    });

    installBtn && installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.remove("show");
    });

    dismissBtn && dismissBtn.addEventListener("click", () => {
      banner.classList.remove("show");
      sessionStorage.setItem("cairn-banner-dismissed", "1");
    });

    /* iOS Safari hint (no beforeinstallprompt) */
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    const iosHint = document.getElementById("ios-hint");
    const iosClose = document.getElementById("ios-close");

    if (isIos && !isInStandalone && !sessionStorage.getItem("cairn-ios-hint")) {
      setTimeout(() => iosHint.classList.add("show"), 3000);
    }
    iosClose && iosClose.addEventListener("click", () => {
      iosHint.classList.remove("show");
      sessionStorage.setItem("cairn-ios-hint", "1");
    });
  </script>
</body>
</html>
