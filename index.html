<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0E1419" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CAIRN" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="ランニング・登山・クライミングのトレーニング記録アプリ" />
  <title>CAIRN — トレーニングログ</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple Touch Icons (SVGでも動作、PNG推奨だがSVGで代替) -->
  <link rel="apple-touch-icon" href="icon-192.svg" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0E1419; }
    body { overscroll-behavior: none; }
    #root { min-height: 100vh; }

    /* Safe area insets for notch/home indicator */
    .pwa-nav {
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
    .pwa-header {
      padding-top: max(18px, env(safe-area-inset-top));
    }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0; background: #0E1419;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 9999;
      transition: opacity .4s ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .loading-mark {
      animation: bob 1.4s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .loading-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: 4px; color: #5C6B77;
      text-transform: uppercase;
    }

    /* Install banner */
    #install-banner {
      display: none;
      position: fixed; bottom: 80px; left: 16px; right: 16px;
      background: #1E2832; border: 1px solid #2A3742;
      border-radius: 14px; padding: 14px 16px;
      z-index: 40; gap: 12px; align-items: center;
      box-shadow: 0 8px 32px #00000055;
    }
    #install-banner.show { display: flex; }
    #install-banner p { flex: 1; font-family: 'Inter', sans-serif; font-size: 13.5px; color: #8A99A6; line-height: 1.45; }
    #install-banner p strong { color: #E8EDF0; }
    #install-btn {
      background: #45C4D6; color: #0E1419; border: none;
      border-radius: 9px; padding: 10px 14px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    #install-dismiss {
      background: none; border: none; color: #5C6B77;
      font-size: 20px; cursor: pointer; padding: 2px 4px;
      font-family: 'Inter', sans-serif;
    }

    /* iOS install hint (no beforeinstallprompt on Safari) */
    #ios-hint {
      display: none;
      position: fixed; bottom: 80px; left: 16px; right: 16px;
      background: #1E2832; border: 1px solid #2A3742;
      border-radius: 14px; padding: 14px 16px;
      z-index: 40;
      box-shadow: 0 8px 32px #00000055;
    }
    #ios-hint.show { display: block; }
    #ios-hint p { font-family: 'Inter', sans-serif; font-size: 13px; color: #8A99A6; line-height: 1.6; }
    #ios-hint p strong { color: #E8EDF0; }
    #ios-close {
      background: none; border: none; color: #5C6B77;
      font-size: 18px; cursor: pointer; float: right; margin-top: -4px;
      font-family: 'Inter', sans-serif;
    }

    /* Offline toast */
    #offline-toast {
      position: fixed; top: max(16px, env(safe-area-inset-top)); left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #E5654B; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      padding: 9px 18px; border-radius: 999px;
      transition: transform .3s ease;
      z-index: 999; white-space: nowrap;
    }
    #offline-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <svg class="loading-mark" width="44" height="50" viewBox="0 0 44 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="39" rx="14" ry="5" fill="#2A3742"/>
      <rect x="8" y="28" width="28" height="9" rx="4" fill="#7FB069"/>
      <rect x="12" y="19" width="20" height="8" rx="3.5" fill="#F2A03D"/>
      <rect x="15.5" y="11" width="13" height="7.5" rx="3" fill="#45C4D6"/>
      <circle cx="22" cy="5" r="4" fill="#E8EDF0"/>
    </svg>
    <div class="loading-label">CAIRN を起動中</div>
  </div>

  <!-- PWA Install banner (Chrome/Android) -->
  <div id="install-banner">
    <p><strong>ホーム画面に追加</strong><br>オフラインでも使えます</p>
    <button id="install-btn">追加</button>
    <button id="install-dismiss">×</button>
  </div>

  <!-- iOS Safari install hint -->
  <div id="ios-hint">
    <button id="ios-close">×</button>
    <p>
      <strong>ホーム画面に追加する方法</strong><br>
      Safari の <strong>共有ボタン（↑）</strong> をタップ →<br>
      「<strong>ホーム画面に追加</strong>」を選択
    </p>
  </div>

  <!-- Offline toast -->
  <div id="offline-toast">📵 オフラインモード</div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- CDN dependencies (順序が重要) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <!-- Shims: named exports expected by the JSX -->
  <script>
    // Make CDN globals available as module-like names for the transpiled code
    window.__CAIRN_DEPS__ = {
      useState: React.useState,
      useEffect: React.useEffect,
      useMemo: React.useMemo,
      useRef: React.useRef,
      Papa: window.Papa,
      // Recharts components
      BarChart: Recharts.BarChart,
      Bar: Recharts.Bar,
      LineChart: Recharts.LineChart,
      Line: Recharts.Line,
      XAxis: Recharts.XAxis,
      YAxis: Recharts.YAxis,
      CartesianGrid: Recharts.CartesianGrid,
      Tooltip: Recharts.Tooltip,
      ResponsiveContainer: Recharts.ResponsiveContainer,
      Cell: Recharts.Cell,
      ReferenceLine: Recharts.ReferenceLine,
      Area: Recharts.Area,
      AreaChart: Recharts.AreaChart,
    };
  </script>

  <!-- Main application (JSX, transpiled in-browser by Babel Standalone) -->
  <script type="text/babel" data-presets="react">
    // ── Destructure all deps from global shim ────────────────────────────
    const {
      useState, useEffect, useMemo, useRef,
      Papa,
      BarChart, Bar, LineChart, Line, XAxis, YAxis,
      CartesianGrid, Tooltip, ResponsiveContainer,
      Cell, ReferenceLine, Area, AreaChart,
    } = window.__CAIRN_DEPS__;

    /* ================================================================== *
     * CAIRN v2 — running / hiking / climbing log
     * ================================================================== */

    const C = {
      bg: "#0E1419", panel: "#161E25", raised: "#1E2832", line: "#2A3742",
      line2: "#384956", text: "#E8EDF0", muted: "#8A99A6", faint: "#5C6B77",
      run: "#F2A03D", hike: "#7FB069", climb: "#45C4D6",
      good: "#7FB069", warn: "#E8B14C", bad: "#E5654B", info: "#5B8FB0",
    };
    const SPORTS = {
      run:   { key: "run",   label: "ランニング",   color: C.run },
      hike:  { key: "hike",  label: "登山",         color: C.hike },
      climb: { key: "climb", label: "クライミング", color: C.climb },
    };
    const RUN_TYPES = ["イージー", "ロング", "テンポ", "インターバル", "レース", "その他"];
    const HARD_RUN = new Set(["テンポ", "インターバル", "レース"]);
    const STYLE_TAGS = ["スラブ", "垂壁", "強傾斜", "ルーフ", "カチ", "スローパー",
      "ピンチ", "ポケット", "ランジ", "コーディネーション", "バランス", "保持力", "持久力"];
    const V_GRADES = ["VB", "V0", "V1", "V2", "V3", "V4", "V5", "V6", "V7", "V8", "V9", "V10", "V11", "V12", "V13", "V14"];
    const KYU_DAN = [{ l: "8級", i: 0 }, { l: "7級", i: 1 }, { l: "6級", i: 2 }, { l: "5級", i: 3 }, { l: "4級", i: 4 }, { l: "3級", i: 5 }, { l: "2級", i: 6 }, { l: "1級", i: 7 }, { l: "初段", i: 8 }, { l: "二段", i: 9 }, { l: "三段", i: 11 }, { l: "四段", i: 13 }, { l: "五段", i: 15 }];
    const YDS = ["5.6", "5.7", "5.8", "5.9", "5.10a", "5.10b", "5.10c", "5.10d", "5.11a", "5.11b", "5.11c", "5.11d", "5.12a", "5.12b", "5.12c", "5.12d", "5.13a", "5.13b", "5.13c", "5.13d", "5.14a"];
    const SEND_RESULTS = { boulder: ["フラッシュ", "完登(RP)", "再登", "プロジェクト"], route: ["オンサイト", "フラッシュ", "完登(RP)", "再登", "プロジェクト"] };
    const ZONE_DEFS = [
      { l: "Z1", name: "回復", hi: 0.60, c: C.info },
      { l: "Z2", name: "有酸素", hi: 0.70, c: C.hike },
      { l: "Z3", name: "テンポ", hi: 0.80, c: C.run },
      { l: "Z4", name: "閾値", hi: 0.90, c: "#E58B3D" },
      { l: "Z5", name: "VO2max", hi: 1.01, c: C.bad },
    ];

    function gradeList(d, s) { if (d === "route") return YDS.map((l, i) => ({ l, i })); return s === "kyudan" ? KYU_DAN : V_GRADES.map((l, i) => ({ l, i })); }
    function idxToLabel(d, idx) { if (d === "route") return YDS[Math.round(idx)] || ""; return V_GRADES[Math.max(0, Math.round(idx))] || ""; }

    /* ---------------- storage (localStorage fallback) ---------------- */
    const mem = {};
    const store = {
      async get(k) {
        try {
          if (typeof window !== "undefined" && window.storage) {
            const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null;
          }
        } catch (e) {}
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) {}
        return k in mem ? mem[k] : null;
      },
      async set(k, v) {
        mem[k] = v;
        try {
          if (typeof window !== "undefined" && window.storage) {
            await window.storage.set(k, JSON.stringify(v)); return;
          }
        } catch (e) {}
        try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
      },
    };
    const K_ENTRIES = "cairn_entries_v2", K_GOALS = "cairn_goals_v2", K_SET = "cairn_settings_v2";

    /* ---------------- math / date ---------------- */
    const today = () => new Date().toISOString().slice(0, 10);
    const parseD = (s) => new Date(s + "T00:00:00");
    const daysBetween = (a, b) => Math.round((parseD(b) - parseD(a)) / 86400000);
    const monthKey = (s) => s.slice(0, 7);
    function weekStart(s) { const d = parseD(s); d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); return d.toISOString().slice(0, 10); }
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    const sessionLoad = (e) => (Number(e.rpe) || 0) * (Number(e.duration) || 0);
    const num = (v) => (v === "" || v == null ? undefined : Number(v));
    const mean = (a) => (a.length ? a.reduce((s, x) => s + x, 0) / a.length : 0);
    const median = (a) => { if (!a.length) return 0; const b = [...a].sort((x, y) => x - y); return b[Math.floor(b.length / 2)]; };
    const fmtPace = (sec) => { if (!sec || !isFinite(sec)) return "—"; const m = Math.floor(sec / 60), s = Math.round(sec % 60); return `${m}:${s.toString().padStart(2, "0")}`; };

    function computeLoad(entries) {
      const t = today();
      const within = (n) => entries.filter((e) => { const d = daysBetween(e.date, t); return d >= 0 && d < n; });
      const sum = (a) => a.reduce((s, e) => s + sessionLoad(e), 0);
      const acute = sum(within(7)), chronic = sum(within(28)) / 4;
      return { acute: Math.round(acute), chronic: Math.round(chronic), acwr: chronic > 0 ? acute / chronic : 0 };
    }
    function weeklySeries(entries, weeks = 10) {
      const map = {}; entries.forEach((e) => { const w = weekStart(e.date); map[w] = (map[w] || 0) + sessionLoad(e); });
      const out = []; let d = parseD(weekStart(today()));
      for (let i = 0; i < weeks; i++) { const k = d.toISOString().slice(0, 10); out.unshift({ week: k.slice(5), load: Math.round(map[k] || 0) }); d.setDate(d.getDate() - 7); }
      return out;
    }
    function acwrStatus(r) { if (!r) return { label: "データ不足", color: C.muted }; if (r < 0.8) return { label: "負荷が低い", color: C.info }; if (r <= 1.3) return { label: "最適ゾーン", color: C.good }; if (r <= 1.5) return { label: "やや高い", color: C.warn }; return { label: "高リスク", color: C.bad }; }

    /* ---------------- GPX / TCX parsing ---------------- */
    function haversine(a, b) {
      const R = 6371000, toR = Math.PI / 180;
      const dLat = (b.lat - a.lat) * toR, dLon = (b.lon - a.lon) * toR;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(a.lat * toR) * Math.cos(b.lat * toR) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }
    function parseTrack(text, filename) {
      let doc; try { doc = new DOMParser().parseFromString(text, "application/xml"); } catch (e) { return null; }
      if (doc.getElementsByTagName("parsererror").length) return null;
      const all = [...doc.getElementsByTagName("*")];
      const isTcx = all.some((e) => e.localName === "Trackpoint");
      const pts = isTcx ? parseTcx(all) : parseGpx(all);
      return pts.length > 1 ? pts : null;
    }
    function childGetter(node) {
      const kids = [...node.getElementsByTagName("*")];
      return (name) => { const el = kids.find((k) => k.localName === name); return el ? el.textContent.trim() : null; };
    }
    function parseGpx(all) {
      const tps = all.filter((e) => e.localName === "trkpt");
      const pts = []; let cum = 0, prev = null;
      for (const tp of tps) {
        const lat = parseFloat(tp.getAttribute("lat")), lon = parseFloat(tp.getAttribute("lon"));
        const g = childGetter(tp);
        const time = g("time"), ele = parseFloat(g("ele")), hr = parseFloat(g("hr")), cad = parseFloat(g("cad"));
        const p = { lat, lon, ele: isNaN(ele) ? null : ele, t: time ? new Date(time).getTime() : null, hr: isNaN(hr) ? null : hr, cad: isNaN(cad) ? null : cad };
        if (prev && !isNaN(lat) && !isNaN(prev.lat)) cum += haversine(prev, p);
        p.dist = cum; pts.push(p); if (!isNaN(lat)) prev = p;
      }
      return pts;
    }
    function parseTcx(all) {
      const tps = all.filter((e) => e.localName === "Trackpoint");
      const pts = [];
      for (const tp of tps) {
        const g = childGetter(tp);
        const time = g("Time"), dist = parseFloat(g("DistanceMeters")), ele = parseFloat(g("AltitudeMeters"));
        const hr = parseFloat(g("Value"));
        const cad = parseFloat(g("RunCadence") ?? g("Cadence"));
        pts.push({ t: time ? new Date(time).getTime() : null, dist: isNaN(dist) ? null : dist, ele: isNaN(ele) ? null : ele, hr: isNaN(hr) ? null : hr, cad: isNaN(cad) ? null : cad });
      }
      let cum = 0;
      for (const p of pts) { if (p.dist == null) p.dist = cum; else cum = p.dist; }
      return pts;
    }
    function downsample(arr, n) { if (arr.length <= n) return arr; const out = []; const step = arr.length / n; for (let i = 0; i < n; i++) out.push(arr[Math.floor(i * step)]); return out; }

    function summarizeTrack(pts) {
      const totalDist = pts.length ? pts[pts.length - 1].dist || 0 : 0;
      const withT = pts.filter((p) => p.t != null);
      const dur = withT.length > 1 ? (withT[withT.length - 1].t - withT[0].t) / 1000 : 0;
      const startDate = withT.length ? new Date(withT[0].t).toISOString().slice(0, 10) : today();
      let gain = 0, lastEle = null;
      pts.forEach((p) => { if (p.ele != null) { if (lastEle != null && p.ele - lastEle > 0.4) gain += p.ele - lastEle; lastEle = p.ele; } });
      const hrs = pts.map((p) => p.hr).filter((h) => h > 0);
      const avgHr = hrs.length ? Math.round(mean(hrs)) : null;
      const maxHrPeak = hrs.length ? Math.max(...hrs) : null;
      const cads = pts.map((p) => p.cad).filter((c) => c > 0);
      const spmFactor = cads.length && median(cads) < 120 ? 2 : 1;
      const avgCadence = cads.length ? Math.round(median(cads) * spmFactor) : null;
      const avgSpd = dur > 0 ? totalDist / dur : 0;
      const paceSec = avgSpd > 0 ? 1000 / avgSpd : null;
      const avgStride = avgCadence && avgSpd ? Math.round((avgSpd / (avgCadence / 60)) * 100) / 100 : null;
      const pairs = [];
      let movingSec = 0;
      for (let i = 1; i < pts.length; i++) {
        const a = pts[i - 1], b = pts[i];
        if (a.t == null || b.t == null) continue;
        const dt = (b.t - a.t) / 1000; if (dt <= 0 || dt > 20) continue;
        const sp = (b.dist - a.dist) / dt; if (sp < 0.4) continue;
        movingSec += dt;
        if (a.hr > 0) pairs.push({ sp, hr: a.hr });
      }
      let decoupling = null;
      if (pairs.length > 20) {
        const h = Math.floor(pairs.length / 2);
        const eff = (arr) => mean(arr.map((p) => p.sp)) / mean(arr.map((p) => p.hr));
        const e1 = eff(pairs.slice(0, h)), e2 = eff(pairs.slice(h));
        if (e1 > 0) decoupling = Math.round(((e1 - e2) / e1) * 1000) / 10;
      }
      const hrSeries = downsample(pts.filter((p) => p.hr > 0).map((p) => p.hr), 120);
      const valid = pts.filter((p) => p.t != null);
      const rawSpeed = valid.map((p, i) => { if (i === 0) return 0; const a = valid[i - 1]; const dt = (p.t - a.t) / 1000; const dd = p.dist - a.dist; return dt > 0 ? dd / dt : 0; });
      const W = 8;
      const series = [];
      for (let i = 0; i < valid.length; i++) {
        let s = 0, c = 0; for (let j = Math.max(0, i - W); j <= Math.min(valid.length - 1, i + W); j++) { s += rawSpeed[j]; c++; }
        const sp = c ? s / c : 0;
        series.push({ km: Math.round((valid[i].dist / 1000) * 100) / 100, pace: sp > 0.4 ? Math.round(1000 / sp) : null, hr: valid[i].hr || null, ele: valid[i].ele != null ? Math.round(valid[i].ele) : null });
      }
      const seriesDS = downsample(series, 160);
      const laps = []; let lapKm = 1, lapStartT = valid.length ? valid[0].t : 0, lapStartEle = null, lapHr = [];
      for (const p of valid) {
        if (lapStartEle == null && p.ele != null) lapStartEle = p.ele;
        if (p.hr > 0) lapHr.push(p.hr);
        if (p.dist >= lapKm * 1000) {
          const sec = (p.t - lapStartT) / 1000;
          laps.push({ km: lapKm, paceSec: Math.round(sec), avgHr: lapHr.length ? Math.round(mean(lapHr)) : null, gain: lapStartEle != null && p.ele != null ? Math.max(0, Math.round(p.ele - lapStartEle)) : null });
          lapKm++; lapStartT = p.t; lapStartEle = p.ele; lapHr = [];
        }
      }
      const gainPerKm = totalDist > 0 ? gain / (totalDist / 1000) : 0;
      const sportGuess = (avgSpd > 0 && avgSpd < 1.7) || gainPerKm > 90 ? "hike" : "run";
      return { date: startDate, sportGuess, distKm: Math.round(totalDist / 100) / 10, durMin: Math.round(dur / 60) || 1, gain: Math.round(gain), avgHr, maxHrPeak, avgCadence, avgStride, paceSec, decoupling, hrSeries, hrSeriesSec: movingSec || dur, series: seriesDS, laps };
    }
    function zonesFromSeries(series, totalSec, maxHr) {
      const secs = [0, 0, 0, 0, 0]; if (!series || !series.length) return secs;
      const per = totalSec / series.length;
      series.forEach((hr) => { const f = hr / maxHr; let z = 4; for (let i = 0; i < 5; i++) { if (f < ZONE_DEFS[i].hi) { z = i; break; } } secs[z] += per; });
      return secs;
    }

    /* ---------------- climbing ELO ---------------- */
    function eloSeries(entries, disc) {
      const sends = [];
      entries.filter((e) => e.sport === "climb").forEach((e) => (e.sends || []).forEach((s) => { if (s.discipline === disc) sends.push({ ...s, date: e.date }); }));
      sends.sort((a, b) => (a.date < b.date ? -1 : 1));
      let R = 1200; const K = 26; const out = [];
      sends.forEach((s) => {
        const P = 1000 + s.idx * 100;
        const E = 1 / (1 + Math.pow(10, (P - R) / 400));
        const win = s.result === "プロジェクト" ? 0 : 1;
        R += K * (win - E);
        out.push({ date: s.date.slice(5), elo: Math.round(R) });
      });
      return { series: out, rating: Math.round(R), n: sends.length };
    }

    /* ---------------- training suggestions ---------------- */
    function buildSuggestions(entries, goals, settings) {
      const t = today();
      const out = [];
      if (entries.length === 0) return out;
      const load = computeLoad(entries);
      const dates = [...new Set(entries.map((e) => e.date))].sort();
      const recent = dates[dates.length - 1];
      let streak = 0;
      if (recent && daysBetween(recent, t) <= 1) {
        let d = recent, set = new Set(dates);
        while (set.has(d)) { streak++; const x = parseD(d); x.setDate(x.getDate() - 1); d = x.toISOString().slice(0, 10); }
      }
      const lastBySport = {};
      entries.forEach((e) => { if (!lastBySport[e.sport] || e.date > lastBySport[e.sport]) lastBySport[e.sport] = e.date; });
      if (load.acwr > 1.5) out.push({ p: 1, color: C.bad, tag: "回復", title: "今週は負荷を落とす", detail: `ACWR ${load.acwr.toFixed(2)} と急増ゾーン。1–2日は休養か軽いZ1で、ケガの確率を下げましょう。` });
      else if (load.acwr > 1.3) out.push({ p: 2, color: C.warn, tag: "注意", title: "増やしすぎに注意", detail: `ACWR ${load.acwr.toFixed(2)}。今週は量を維持し、これ以上の急増は避けると安全です。` });
      if (streak >= 6) out.push({ p: 1, color: C.warn, tag: "休養", title: "休息日を入れる", detail: `${streak}日連続でトレーニング中。完全休養を1日とると超回復が進みます。` });
      if (load.chronic > 0 && load.acwr > 0 && load.acwr < 0.8) out.push({ p: 3, color: C.info, tag: "ビルド", title: "少しずつ量を戻せる", detail: "負荷が下がり気味。週あたり10%程度までなら安全に増やせます。" });
      const recentRuns = entries.filter((e) => e.sport === "run" && e.runType && daysBetween(e.date, t) < 21);
      if (recentRuns.length >= 4) {
        const easy = recentRuns.filter((e) => !HARD_RUN.has(e.runType) && e.runType !== "その他").length;
        const hard = recentRuns.filter((e) => HARD_RUN.has(e.runType)).length;
        const pct = easy + hard ? easy / (easy + hard) : 1;
        if (pct < 0.7) out.push({ p: 2, color: C.run, tag: "ランニング", title: "イージーを増やす", detail: `直近の高強度比率が高め（イージー${Math.round(pct * 100)}%）。土台づくりにはZ1–2を8割目安に。` });
        else if (hard === 0 && load.acwr <= 1.3) out.push({ p: 4, color: C.run, tag: "ランニング", title: "質の高い1本を", detail: "最近は楽な走りが中心。テンポ走かインターバルを1本入れると刺激になります。" });
      }
      Object.keys(lastBySport).forEach((sp) => {
        const gap = daysBetween(lastBySport[sp], t);
        if (gap >= 14) out.push({ p: 3, color: SPORTS[sp].color, tag: SPORTS[sp].label, title: `${SPORTS[sp].label}が${gap}日空いている`, detail: "間隔が開くと感覚が鈍りがち。短時間でも一度触れておくと維持できます。" });
      });
      const acc = {};
      entries.filter((e) => e.sport === "climb").forEach((e) => (e.sends || []).forEach((s) => s.tags.forEach((tg) => { acc[tg] = acc[tg] || { total: 0, done: 0 }; acc[tg].total++; if (s.result !== "プロジェクト") acc[tg].done++; })));
      const weak = Object.entries(acc).filter(([, v]) => v.total >= 3).map(([tg, v]) => ({ tg, rate: v.done / v.total })).sort((a, b) => a.rate - b.rate)[0];
      if (weak && weak.rate < 0.55) out.push({ p: 3, color: C.climb, tag: "クライミング", title: `苦手な「${weak.tg}」を攻める`, detail: `完登率 ${Math.round(weak.rate * 100)}%。次のセッションは${weak.tg}系の課題を中心にすると伸びしろ大。` });
      goals.forEach((g) => {
        if (!g.deadline) return; const left = daysBetween(t, g.deadline); if (left < 0 || left > 30) return;
        const cur = goalCurrent(g, entries);
        const pct = g.metric === "manual" ? (g.manual || 0) : Math.min(100, Math.round((cur / (g.target || 1)) * 100));
        if (pct < 70) out.push({ p: 2, color: g.sportColor || C.info, tag: "目標", title: `「${g.title || ""}」まで残り${left}日`, detail: `進捗 ${pct}%。ペースを上げると期限に間に合います。` });
      });
      if (out.length === 0) out.push({ p: 5, color: C.good, tag: "良好", title: "バランス良好。継続を", detail: "負荷・強度配分ともに適正です。今のリズムで予定どおり進めましょう。" });
      out.sort((a, b) => a.p - b.p);
      return out.slice(0, 4);
    }

    /* ---------------- UI atoms ---------------- */
    function Panel({ children, style }) { return <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16, ...style }}>{children}</div>; }
    function Eyebrow({ children, color = C.faint }) { return <div style={{ fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color }}>{children}</div>; }
    function Stat({ label, value, sub, color = C.text }) {
      return <div><Eyebrow>{label}</Eyebrow><div style={{ fontFamily: "var(--mono)", fontSize: 24, fontWeight: 600, color, lineHeight: 1.1, marginTop: 4 }}>{value}</div>{sub && <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{sub}</div>}</div>;
    }
    function Field({ label, children }) { return <label style={{ display: "block", marginBottom: 12 }}><div style={{ fontSize: 12, color: C.muted, marginBottom: 5 }}>{label}</div>{children}</label>; }
    const inputStyle = { width: "100%", boxSizing: "border-box", background: C.raised, color: C.text, border: `1px solid ${C.line2}`, borderRadius: 9, padding: "10px 11px", fontSize: 15, fontFamily: "inherit", outline: "none" };
    const TextInput = (p) => <input {...p} className="cairn-in" style={{ ...inputStyle, ...p.style }} />;
    const Select = ({ children, ...p }) => <select {...p} className="cairn-in" style={{ ...inputStyle, appearance: "none", ...p.style }}>{children}</select>;
    function Btn({ children, onClick, kind = "ghost", color = C.text, style, type }) {
      const k = { solid: { background: color, color: C.bg }, ghost: { background: C.raised, color: C.text, border: `1px solid ${C.line2}` }, line: { background: "transparent", color, border: `1px solid ${color}` } };
      return <button type={type || "button"} onClick={onClick} className="cairn-btn" style={{ border: "none", borderRadius: 9, padding: "10px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", ...k[kind], ...style }}>{children}</button>;
    }
    function Chip({ active, color, onClick, children }) {
      return <button onClick={onClick} className="cairn-chip" style={{ border: `1px solid ${active ? color : C.line2}`, background: active ? color + "26" : "transparent", color: active ? color : C.muted, borderRadius: 999, padding: "6px 11px", fontSize: 12.5, cursor: "pointer", fontFamily: "inherit" }}>{children}</button>;
    }
    const chartTip = { background: C.raised, border: `1px solid ${C.line2}`, borderRadius: 8, fontSize: 12, color: C.text };

    /* ================================================================== *
     * APP
     * ================================================================== */
    function App() {
      const [tab, setTab] = useState("log");
      const [entries, setEntries] = useState([]);
      const [goals, setGoals] = useState([]);
      const [settings, setSettings] = useState({ maxHr: 190 });
      const [loaded, setLoaded] = useState(false);
      const [showData, setShowData] = useState(false);

      useEffect(() => { (async () => {
        const e = await store.get(K_ENTRIES); const g = await store.get(K_GOALS); const s = await store.get(K_SET);
        if (e) setEntries(e); if (g) setGoals(g); if (s) setSettings(s); setLoaded(true);
        /* Hide loading screen */
        const el = document.getElementById("loading");
        if (el) { el.classList.add("hide"); setTimeout(() => el.remove(), 500); }
      })(); }, []);

      const saveEntries = (n) => { setEntries(n); store.set(K_ENTRIES, n); };
      const saveGoals = (n) => { setGoals(n); store.set(K_GOALS, n); };
      const saveSettings = (n) => { setSettings(n); store.set(K_SET, n); };
      const sorted = useMemo(() => [...entries].sort((a, b) => (a.date < b.date ? 1 : -1)), [entries]);

      const TABS = [{ k: "log", label: "記録" }, { k: "dash", label: "ダッシュ" }, { k: "analysis", label: "分析" }, { k: "goals", label: "目標" }];

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "var(--sans)", paddingBottom: 78,
          backgroundImage: `repeating-radial-gradient(circle at 18% -12%, ${C.line}1f 0 1px, transparent 1px 52px), repeating-radial-gradient(circle at 96% 8%, ${C.line}16 0 1px, transparent 1px 64px)` }}>
          <style>{`
            :root{--sans:'Inter',system-ui,-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;--mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;}
            *{-webkit-tap-highlight-color:transparent;}
            .cairn-in:focus{border-color:${C.info}!important;} .cairn-in::placeholder{color:${C.faint};}
            .cairn-btn:active,.cairn-chip:active{transform:scale(.97);} .cairn-btn,.cairn-chip{transition:transform .08s ease;}
            ::-webkit-scrollbar{width:8px;height:8px;} ::-webkit-scrollbar-thumb{background:${C.line2};border-radius:8px;}
            @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
            select.cairn-in option{background:${C.raised};color:${C.text};}
          `}</style>

          <header className="pwa-header" style={{ padding: "18px 16px 10px", display: "flex", alignItems: "center", justifyContent: "space-between", maxWidth: 760, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
              <CairnMark />
              <div>
                <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: 3, color: C.faint }}>ケルン / TRAINING LOG</div>
                <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: 1, lineHeight: 1 }}>CAIRN</div>
              </div>
            </div>
            <Btn kind="ghost" onClick={() => setShowData(true)} style={{ padding: "8px 11px", fontSize: 13 }}>データ</Btn>
          </header>

          <main style={{ maxWidth: 760, margin: "0 auto", padding: "6px 16px 24px" }}>
            {!loaded ? <div style={{ color: C.muted, padding: 40, textAlign: "center" }}>読み込み中…</div>
              : tab === "log" ? <LogTab entries={sorted} saveEntries={saveEntries} settings={settings} />
              : tab === "dash" ? <DashTab entries={entries} goals={goals} settings={settings} />
              : tab === "analysis" ? <AnalysisTab entries={entries} settings={settings} />
              : <GoalsTab entries={entries} goals={goals} saveGoals={saveGoals} />}
          </main>

          <nav className="pwa-nav" style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.panel + "f2", borderTop: `1px solid ${C.line}`, backdropFilter: "blur(8px)", display: "flex", maxWidth: 760, margin: "0 auto", left: "50%", transform: "translateX(-50%)", width: "100%" }}>
            {TABS.map((t) => (
              <button key={t.k} onClick={() => setTab(t.k)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", padding: "11px 0 14px", fontFamily: "inherit", color: tab === t.k ? C.text : C.faint, fontSize: 12.5, fontWeight: tab === t.k ? 700 : 500, borderTop: `2px solid ${tab === t.k ? C.info : "transparent"}`, marginTop: -1 }}>{t.label}</button>
            ))}
          </nav>

          {showData && <DataModal entries={entries} goals={goals} settings={settings} onClose={() => setShowData(false)} saveEntries={saveEntries} saveGoals={saveGoals} saveSettings={saveSettings} />}
        </div>
      );
    }

    function CairnMark() {
      return (
        <svg width="30" height="34" viewBox="0 0 30 34" fill="none">
          <ellipse cx="15" cy="25.5" rx="9.5" ry="3.4" fill={C.line2} />
          <rect x="6" y="18.5" width="18" height="5.4" rx="2.6" fill={C.hike} />
          <rect x="8.5" y="12.5" width="13" height="5" rx="2.4" fill={C.run} />
          <rect x="10.5" y="7" width="9" height="4.6" rx="2.2" fill={C.climb} />
          <circle cx="15" cy="3.4" r="2.4" fill={C.text} />
        </svg>
      );
    }

    /* ================================================================== *
     * LOG TAB
     * ================================================================== */
    function LogTab({ entries, saveEntries, settings }) {
      const [open, setOpen] = useState(false);
      const [detail, setDetail] = useState(null);
      const [imports, setImports] = useState(null);
      const fileRef = useRef(null);
      const addEntry = (e) => { saveEntries([{ ...e, id: uid() }, ...entries]); setOpen(false); };
      const del = (id) => saveEntries(entries.filter((x) => x.id !== id));
      const handleFiles = async (ev) => {
        const files = [...ev.target.files]; ev.target.value = "";
        if (!files.length) return;
        const drafts = [];
        for (const f of files) {
          const fr = await readFileText(f);
          if (!fr) { drafts.push({ filename: f.name, error: true }); continue; }
          const pts = parseTrack(fr.text, fr.name);
          if (!pts) { drafts.push({ filename: fr.name, error: true }); continue; }
          const m = summarizeTrack(pts);
          drafts.push({ filename: fr.name, metrics: m, sport: m.sportGuess, rpe: 5, runType: "イージー" });
        }
        drafts.sort((a, b) => ((a.metrics?.date || "") < (b.metrics?.date || "") ? -1 : 1));
        setImports(drafts);
      };
      const commitImports = (drafts) => {
        const fresh = drafts.filter((d) => d.metrics).map((d) => { const m = d.metrics; return { id: uid(), sport: d.sport, date: m.date, rpe: d.rpe, duration: m.durMin, distance: m.distKm, elevGain: m.gain, runType: d.sport === "run" ? d.runType : undefined, metrics: m, notes: d.filename }; });
        saveEntries([...fresh, ...entries]); setImports(null);
      };
      return (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <Btn kind="solid" color={C.run} onClick={() => fileRef.current.click()} style={{ flex: 2, padding: 14 }}>＋ GPX / TCX を追加</Btn>
            <Btn kind="ghost" onClick={() => setOpen(true)} style={{ flex: 1, padding: 14 }}>手入力</Btn>
            <input ref={fileRef} type="file" accept=".gpx,.tcx,.xml" multiple onChange={handleFiles} style={{ display: "none" }} />
          </div>
          <div style={{ fontSize: 11.5, color: C.faint, marginTop: -8, marginBottom: 14 }}>複数ファイルをまとめて選べます。日付と競技はファイルから自動判定します。</div>
          {open && <LogForm onSave={addEntry} onCancel={() => setOpen(false)} canCancel={true} />}
          {imports && <ImportReview drafts={imports} entries={entries} onCommit={commitImports} onCancel={() => setImports(null)} />}
          {entries.length === 0 && !open && !imports && <Panel style={{ textAlign: "center", padding: 28 }}><div style={{ color: C.muted, fontSize: 14, lineHeight: 1.7 }}>まだ記録がありません。<br />ワークアウトのGPX/TCXを上のボタンから追加するか、<br />右上「データ」でデモを読み込めます。</div></Panel>}
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 4 }}>
            {entries.map((e) => <EntryCard key={e.id} e={e} settings={settings} onDelete={() => del(e.id)} onOpen={() => setDetail(e)} />)}
          </div>
          {detail && <ActivityDetail e={detail} settings={settings} onClose={() => setDetail(null)} />}
        </div>
      );
    }
    function readFileText(file) { return new Promise((res) => { const r = new FileReader(); r.onload = () => res({ name: file.name, text: r.result }); r.onerror = () => res(null); r.readAsText(file); }); }

    function ImportReview({ drafts, entries, onCommit, onCancel }) {
      const [rows, setRows] = useState(drafts);
      const ok = rows.filter((r) => r.metrics);
      const bad = rows.filter((r) => r.error);
      const isDup = (r) => r.metrics && entries.some((e) => e.date === r.metrics.date && Math.abs((e.distance || 0) - r.metrics.distKm) < 0.2);
      const upd = (i, patch) => setRows((rs) => rs.map((r, j) => (j === i ? { ...r, ...patch } : r)));
      const remove = (i) => setRows((rs) => rs.filter((_, j) => j !== i));
      return (
        <Panel style={{ marginBottom: 16, borderColor: C.run }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Eyebrow color={C.run}>取り込みプレビュー（{ok.length}件）</Eyebrow>
            <button onClick={onCancel} style={{ background: "none", border: "none", color: C.muted, fontSize: 20, cursor: "pointer" }}>×</button>
          </div>
          {bad.length > 0 && <div style={{ fontSize: 12, color: C.warn, marginTop: 8 }}>{bad.length}件は解析できませんでした。</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 10, margin: "12px 0" }}>
            {rows.map((r, i) => r.metrics ? (
              <div key={i} style={{ border: `1px solid ${C.line2}`, borderRadius: 10, padding: 11 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                  <span style={{ fontFamily: "var(--mono)", fontSize: 13, color: C.text }}>{r.metrics.date}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {isDup(r) && <span style={{ fontSize: 10, color: C.warn, border: `1px solid ${C.warn}`, borderRadius: 4, padding: "1px 5px" }}>重複の可能性</span>}
                    <button onClick={() => remove(i)} style={{ background: "none", border: "none", color: C.faint, fontSize: 16, cursor: "pointer" }}>×</button>
                  </div>
                </div>
                <div style={{ fontSize: 12.5, color: C.muted, margin: "4px 0 9px" }}>{r.metrics.distKm} km · {fmtPace(r.metrics.paceSec)} /km{r.metrics.avgHr ? ` · ♥${r.metrics.avgHr}` : ""}{r.metrics.avgCadence ? ` · ${r.metrics.avgCadence}spm` : ""} · ↑{r.metrics.gain}m</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                  <Chip active={r.sport === "run"} color={C.run} onClick={() => upd(i, { sport: "run" })}>ランニング</Chip>
                  <Chip active={r.sport === "hike"} color={C.hike} onClick={() => upd(i, { sport: "hike" })}>登山</Chip>
                  {r.sport === "run" && <select value={r.runType} onChange={(e) => upd(i, { runType: e.target.value })} className="cairn-in" style={{ ...inputStyle, width: "auto", padding: "5px 8px", fontSize: 12.5 }}>{RUN_TYPES.map((t) => <option key={t}>{t}</option>)}</select>}
                  <span style={{ marginLeft: "auto", fontSize: 11.5, color: C.muted }}>RPE {r.rpe}</span>
                </div>
                <input type="range" min="1" max="10" value={r.rpe} onChange={(e) => upd(i, { rpe: Number(e.target.value) })} style={{ width: "100%", accentColor: SPORTS[r.sport].color, marginTop: 6 }} />
              </div>
            ) : null)}
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn kind="solid" color={C.run} onClick={() => onCommit(rows)} style={{ flex: 1, padding: 12 }}>{ok.length}件を記録に追加</Btn>
            <Btn kind="ghost" onClick={onCancel} style={{ padding: 12 }}>キャンセル</Btn>
          </div>
        </Panel>
      );
    }

    function EntryCard({ e, settings, onDelete, onOpen }) {
      const sp = SPORTS[e.sport];
      const m = e.metrics; const detail = [];
      if (e.sport === "run") {
        if (e.distance) detail.push(`${e.distance} km`);
        if (m?.paceSec) detail.push(`${fmtPace(m.paceSec)} /km`); else if (e.distance && e.duration) detail.push(`${fmtPace((e.duration * 60) / e.distance)} /km`);
        if (m?.avgHr) detail.push(`♥ ${m.avgHr}`);
        if (m?.avgCadence) detail.push(`${m.avgCadence} spm`);
        if (e.runType) detail.push(e.runType);
      } else if (e.sport === "hike") {
        if (e.distance) detail.push(`${e.distance} km`); if (e.elevGain) detail.push(`↑${e.elevGain} m`);
        if (e.packKg) detail.push(`${e.packKg} kg`); if (e.ctr) detail.push(`CT比 ${e.ctr}%`); if (e.peak) detail.push(e.peak);
      } else if (e.sport === "climb") {
        const done = (e.sends || []).filter((s) => s.result !== "プロジェクト");
        if (done.length) { const best = done.reduce((a, b) => (b.idx > a.idx ? b : a)); detail.push(`最高 ${best.grade}`); }
        detail.push(`${done.length}/${(e.sends || []).length} 完登`);
      }
      const zones = m?.hrSeries ? zonesFromSeries(m.hrSeries, m.hrSeriesSec, settings.maxHr) : null;
      const zTot = zones ? zones.reduce((a, b) => a + b, 0) : 0;
      const openable = !!m || e.sport === "climb";
      return (
        <Panel style={{ padding: 13, display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ width: 4, alignSelf: "stretch", borderRadius: 4, background: sp.color }} />
          <div onClick={openable ? onOpen : undefined} style={{ flex: 1, minWidth: 0, cursor: openable ? "pointer" : "default" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
              <span style={{ fontWeight: 600, color: sp.color, fontSize: 14 }}>{sp.label}{m && <span style={{ fontSize: 10, color: C.faint, marginLeft: 6, fontFamily: "var(--mono)" }}>GPS</span>}</span>
              <span style={{ fontFamily: "var(--mono)", fontSize: 12, color: C.muted }}>{e.date}</span>
            </div>
            <div style={{ fontSize: 13, marginTop: 4, lineHeight: 1.5 }}>{detail.join(" · ") || "—"}</div>
            {zones && zTot > 0 && (
              <div style={{ display: "flex", height: 5, borderRadius: 3, overflow: "hidden", marginTop: 7, background: C.raised }}>
                {zones.map((s, i) => s > 0 ? <div key={i} style={{ width: `${(s / zTot) * 100}%`, background: ZONE_DEFS[i].c }} /> : null)}
              </div>
            )}
            <div style={{ display: "flex", gap: 10, marginTop: 6, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontFamily: "var(--mono)", fontSize: 11, color: C.faint }}>RPE {e.rpe} · {e.duration}分 · 負荷 {sessionLoad(e)}</span>
              {e.notes && <span style={{ fontSize: 12, color: C.muted }}>{e.notes}</span>}
              {openable && <span style={{ marginLeft: "auto", fontSize: 12, color: sp.color }}>詳細 ›</span>}
            </div>
          </div>
          <button onClick={onDelete} aria-label="削除" style={{ background: "none", border: "none", color: C.faint, cursor: "pointer", fontSize: 18, padding: 2 }}>×</button>
        </Panel>
      );
    }

    function LogForm({ onSave, onCancel, canCancel }) {
      const [sport, setSport] = useState("run");
      const [f, setF] = useState({ date: today(), rpe: 5, duration: "", notes: "", distance: "", elevGain: "", avgHr: "", runType: "イージー", packKg: "", ctr: "", peak: "" });
      const [sends, setSends] = useState([]);
      const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
      const submit = () => {
        if (!f.duration) { alert("時間（分）を入力してください。"); return; }
        const base = { sport, date: f.date, rpe: Number(f.rpe), duration: Number(f.duration), notes: f.notes.trim() };
        let ex = {};
        if (sport === "run") ex = { distance: num(f.distance), elevGain: num(f.elevGain), avgHr: num(f.avgHr), runType: f.runType };
        if (sport === "hike") ex = { distance: num(f.distance), elevGain: num(f.elevGain), packKg: num(f.packKg), ctr: num(f.ctr), peak: f.peak.trim() };
        if (sport === "climb") ex = { sends };
        onSave({ ...base, ...ex });
      };
      return (
        <Panel style={{ marginBottom: 16 }}>
          <Eyebrow color={C.info}>新しいセッション</Eyebrow>
          <div style={{ display: "flex", gap: 8, margin: "12px 0 16px" }}>
            {Object.values(SPORTS).map((s) => (
              <button key={s.key} onClick={() => setSport(s.key)} style={{ flex: 1, padding: "10px 4px", borderRadius: 10, cursor: "pointer", fontFamily: "inherit", border: `1px solid ${sport === s.key ? s.color : C.line2}`, background: sport === s.key ? s.color + "22" : "transparent", color: sport === s.key ? s.color : C.muted, fontWeight: 600, fontSize: 13 }}>{s.label}</button>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="日付"><TextInput type="date" value={f.date} onChange={(e) => set("date", e.target.value)} /></Field>
            <Field label="時間（分）"><TextInput inputMode="numeric" placeholder="60" value={f.duration} onChange={(e) => set("duration", e.target.value)} /></Field>
          </div>
          <Field label={`主観的なきつさ RPE — ${f.rpe}/10`}><input type="range" min="1" max="10" value={f.rpe} onChange={(e) => set("rpe", e.target.value)} style={{ width: "100%", accentColor: SPORTS[sport].color }} /></Field>
          {sport === "run" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="距離（km）"><TextInput inputMode="decimal" value={f.distance} onChange={(e) => set("distance", e.target.value)} /></Field>
              <Field label="獲得標高（m）"><TextInput inputMode="numeric" value={f.elevGain} onChange={(e) => set("elevGain", e.target.value)} /></Field>
              <Field label="平均心拍（任意）"><TextInput inputMode="numeric" value={f.avgHr} onChange={(e) => set("avgHr", e.target.value)} /></Field>
              <Field label="種別"><Select value={f.runType} onChange={(e) => set("runType", e.target.value)}>{RUN_TYPES.map((t) => <option key={t}>{t}</option>)}</Select></Field>
            </div>
          )}
          {sport === "hike" && (<>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="距離（km）"><TextInput inputMode="decimal" value={f.distance} onChange={(e) => set("distance", e.target.value)} /></Field>
              <Field label="獲得標高（m）"><TextInput inputMode="numeric" value={f.elevGain} onChange={(e) => set("elevGain", e.target.value)} /></Field>
              <Field label="ザック重量（kg）"><TextInput inputMode="decimal" value={f.packKg} onChange={(e) => set("packKg", e.target.value)} /></Field>
              <Field label="コースタイム比（%）"><TextInput inputMode="numeric" placeholder="100=標準" value={f.ctr} onChange={(e) => set("ctr", e.target.value)} /></Field>
            </div>
            <Field label="山名・ルート（任意）"><TextInput value={f.peak} onChange={(e) => set("peak", e.target.value)} placeholder="例：剱岳 早月尾根" /></Field>
          </>)}
          {sport === "climb" && <SendEditor sends={sends} setSends={setSends} />}
          <Field label="メモ（任意）"><TextInput value={f.notes} onChange={(e) => set("notes", e.target.value)} placeholder="コンディション・気づき" /></Field>
          <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
            <Btn kind="solid" color={SPORTS[sport].color} onClick={submit} style={{ flex: 1, padding: 13 }}>保存</Btn>
            {canCancel && <Btn kind="ghost" onClick={onCancel} style={{ padding: 13 }}>キャンセル</Btn>}
          </div>
        </Panel>
      );
    }

    function SendEditor({ sends, setSends }) {
      const [discipline, setDiscipline] = useState("boulder");
      const [system, setSystem] = useState("V");
      const [grade, setGrade] = useState("V3");
      const [result, setResult] = useState("完登(RP)");
      const [tags, setTags] = useState([]);
      const list = gradeList(discipline, system);
      const add = () => { const g = list.find((x) => x.l === grade) || list[0]; setSends([...sends, { discipline, grade: g.l, idx: g.i, result, tags: [...tags] }]); setTags([]); };
      const toggle = (t) => setTags((p) => (p.includes(t) ? p.filter((x) => x !== t) : [...p, t]));
      return (
        <div style={{ border: `1px solid ${C.line}`, borderRadius: 11, padding: 12, marginBottom: 12 }}>
          <Eyebrow color={C.climb}>この日に触った課題</Eyebrow>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 10 }}>
            <Field label="種目"><Select value={discipline} onChange={(e) => { const d = e.target.value; setDiscipline(d); const l = gradeList(d, system); setGrade(l[Math.min(3, l.length - 1)].l); setResult(SEND_RESULTS[d][1]); }}><option value="boulder">ボルダー</option><option value="route">ルート</option></Select></Field>
            {discipline === "boulder" ? <Field label="グレード体系"><Select value={system} onChange={(e) => { setSystem(e.target.value); const l = gradeList("boulder", e.target.value); setGrade(l[Math.min(3, l.length - 1)].l); }}><option value="V">Vスケール</option><option value="kyudan">段・級</option></Select></Field> : <div />}
            <Field label="グレード"><Select value={grade} onChange={(e) => setGrade(e.target.value)}>{list.map((g) => <option key={g.l}>{g.l}</option>)}</Select></Field>
            <Field label="結果"><Select value={result} onChange={(e) => setResult(e.target.value)}>{SEND_RESULTS[discipline].map((r) => <option key={r}>{r}</option>)}</Select></Field>
          </div>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>スタイル（弱点分析・複数可）</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>{STYLE_TAGS.map((t) => <Chip key={t} active={tags.includes(t)} color={C.climb} onClick={() => toggle(t)}>{t}</Chip>)}</div>
          <Btn kind="line" color={C.climb} onClick={add} style={{ width: "100%" }}>＋ この課題を追加</Btn>
          {sends.length > 0 && <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>{sends.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, background: C.raised, borderRadius: 8, padding: "7px 10px" }}>
              <span style={{ fontFamily: "var(--mono)", fontWeight: 600, color: C.climb }}>{s.grade}</span>
              <span style={{ color: C.muted }}>{s.result}</span>
              <span style={{ color: C.faint, fontSize: 11, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.tags.join("・")}</span>
              <button onClick={() => setSends(sends.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: C.faint, cursor: "pointer", fontSize: 16 }}>×</button>
            </div>))}</div>}
        </div>
      );
    }

    /* ================================================================== *
     * ACTIVITY DETAIL
     * ================================================================== */
    function ActivityDetail({ e, settings, onClose }) {
      const sp = SPORTS[e.sport];
      const m = e.metrics;
      const zones = m?.hrSeries ? zonesFromSeries(m.hrSeries, m.hrSeriesSec, settings.maxHr) : null;
      const zTot = zones ? zones.reduce((a, b) => a + b, 0) : 0;
      const stats = [];
      if (m) {
        stats.push(["距離", `${m.distKm} km`], ["時間", `${m.durMin} 分`], ["ペース", `${fmtPace(m.paceSec)} /km`],
          ["平均心拍", m.avgHr ? `${m.avgHr}` : "—"], ["最大心拍", m.maxHrPeak ? `${m.maxHrPeak}` : "—"],
          ["ケイデンス", m.avgCadence ? `${m.avgCadence}` : "—"], ["ストライド", m.avgStride ? `${m.avgStride} m` : "—"],
          ["獲得標高", `${m.gain} m`], ["心拍ドリフト", m.decoupling != null ? `${m.decoupling}%` : "—"]);
      } else if (e.sport !== "climb") {
        if (e.distance) stats.push(["距離", `${e.distance} km`]);
        stats.push(["時間", `${e.duration} 分`]);
        if (e.elevGain) stats.push(["獲得標高", `${e.elevGain} m`]);
        if (e.ctr) stats.push(["CT比", `${e.ctr}%`]);
        if (e.packKg) stats.push(["ザック", `${e.packKg} kg`]);
      }
      const eleData = m?.series?.some((p) => p.ele != null) ? m.series : null;
      return (
        <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 60, overflowY: "auto" }}>
          <div style={{ maxWidth: 760, margin: "0 auto", padding: "16px 16px 40px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: C.bg, padding: "4px 0 12px", zIndex: 2 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 4, height: 26, borderRadius: 3, background: sp.color }} />
                <div><div style={{ fontWeight: 700, fontSize: 17, color: sp.color }}>{sp.label}{e.peak ? ` · ${e.peak}` : ""}</div><div style={{ fontFamily: "var(--mono)", fontSize: 12, color: C.muted }}>{e.date} · RPE {e.rpe} · 負荷 {sessionLoad(e)}</div></div>
              </div>
              <Btn kind="ghost" onClick={onClose} style={{ padding: "8px 12px" }}>閉じる</Btn>
            </div>
            {stats.length > 0 && (
              <Panel style={{ marginBottom: 14 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "14px 10px" }}>
                  {stats.map(([k, v]) => <div key={k}><div style={{ fontSize: 11, color: C.faint }}>{k}</div><div style={{ fontFamily: "var(--mono)", fontSize: 18, fontWeight: 600, marginTop: 2 }}>{v}</div></div>)}
                </div>
              </Panel>
            )}
            {zones && zTot > 0 && (
              <Panel style={{ marginBottom: 14 }}>
                <Eyebrow color={C.run}>心拍ゾーン（このアクティビティ）</Eyebrow>
                <div style={{ display: "flex", height: 14, borderRadius: 7, overflow: "hidden", margin: "12px 0 10px", background: C.raised }}>
                  {zones.map((s, i) => s > 0 ? <div key={i} style={{ width: `${(s / zTot) * 100}%`, background: ZONE_DEFS[i].c }} /> : null)}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 14px" }}>
                  {ZONE_DEFS.map((z, i) => zones[i] > 0 ? <span key={z.l} style={{ fontSize: 11.5, color: C.muted, display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: z.c }} /><span style={{ fontFamily: "var(--mono)", color: z.c }}>{z.l}</span> {Math.round((zones[i] / zTot) * 100)}%</span> : null)}
                </div>
              </Panel>
            )}
            {m?.series && m.series.length > 2 && (
              <Panel style={{ marginBottom: 14 }}>
                <Eyebrow>ペース × 心拍</Eyebrow>
                <div style={{ height: 210, marginTop: 12 }}>
                  <ResponsiveContainer><LineChart data={m.series} margin={{ top: 4, right: 6, left: -8, bottom: 0 }}>
                    <CartesianGrid stroke={C.line} vertical={false} />
                    <XAxis dataKey="km" type="number" domain={[0, "dataMax"]} tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} tickFormatter={(v) => v.toFixed(0)} unit="km" />
                    <YAxis yAxisId="pace" reversed tickFormatter={fmtPace} tick={{ fill: C.run, fontSize: 10 }} tickLine={false} axisLine={false} width={42} />
                    <YAxis yAxisId="hr" orientation="right" tick={{ fill: C.bad, fontSize: 10 }} tickLine={false} axisLine={false} width={32} domain={["dataMin-6", "dataMax+6"]} />
                    <Tooltip contentStyle={chartTip} labelFormatter={(v) => `${v} km`} formatter={(val, name) => name === "pace" ? [`${fmtPace(val)} /km`, "ペース"] : [`${val} bpm`, "心拍"]} />
                    <Line yAxisId="pace" type="monotone" dataKey="pace" stroke={C.run} strokeWidth={2} dot={false} connectNulls />
                    <Line yAxisId="hr" type="monotone" dataKey="hr" stroke={C.bad} strokeWidth={1.6} dot={false} connectNulls />
                  </LineChart></ResponsiveContainer>
                </div>
                <div style={{ display: "flex", gap: 14, fontSize: 11.5, color: C.muted }}><span style={{ color: C.run }}>— ペース</span><span style={{ color: C.bad }}>— 心拍</span></div>
              </Panel>
            )}
            {eleData && (
              <Panel style={{ marginBottom: 14 }}>
                <Eyebrow color={C.hike}>標高プロファイル</Eyebrow>
                <div style={{ height: 120, marginTop: 12 }}>
                  <ResponsiveContainer><LineChart data={eleData} margin={{ top: 4, right: 6, left: -10, bottom: 0 }}>
                    <CartesianGrid stroke={C.line} vertical={false} />
                    <XAxis dataKey="km" type="number" domain={[0, "dataMax"]} tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} tickFormatter={(v) => v.toFixed(0)} unit="km" />
                    <YAxis tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} width={40} domain={["dataMin-10", "dataMax+10"]} />
                    <Tooltip contentStyle={chartTip} formatter={(v) => [`${v} m`, "標高"]} labelFormatter={(v) => `${v} km`} />
                    <Line type="monotone" dataKey="ele" stroke={C.hike} strokeWidth={1.8} dot={false} connectNulls />
                  </LineChart></ResponsiveContainer>
                </div>
              </Panel>
            )}
            {m?.laps && m.laps.length > 0 && <LapTable laps={m.laps} />}
            {e.sport === "climb" && <ClimbDetail e={e} />}
            {e.notes && <Panel style={{ marginTop: 14 }}><Eyebrow>メモ</Eyebrow><div style={{ fontSize: 14, marginTop: 8, color: C.text }}>{e.notes}</div></Panel>}
          </div>
        </div>
      );
    }

    function LapTable({ laps }) {
      const paces = laps.map((l) => l.paceSec).filter(Boolean);
      const fast = Math.min(...paces), slow = Math.max(...paces);
      const wOf = (p) => slow === fast ? 60 : 25 + ((slow - p) / (slow - fast)) * 75;
      return (
        <Panel style={{ marginBottom: 14 }}>
          <Eyebrow>ラップ（1 kmごと）</Eyebrow>
          <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 7 }}>
            {laps.map((l) => (
              <div key={l.km} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 24, fontFamily: "var(--mono)", fontSize: 12, color: C.muted }}>{l.km}</span>
                <div style={{ flex: 1, height: 18, background: C.raised, borderRadius: 5, position: "relative", overflow: "hidden" }}>
                  <div style={{ width: `${wOf(l.paceSec)}%`, height: "100%", background: C.run + "55", borderRight: `2px solid ${C.run}` }} />
                  <span style={{ position: "absolute", left: 8, top: 0, lineHeight: "18px", fontFamily: "var(--mono)", fontSize: 12, color: C.text }}>{fmtPace(l.paceSec)}</span>
                </div>
                <span style={{ width: 50, textAlign: "right", fontFamily: "var(--mono)", fontSize: 12, color: C.bad }}>{l.avgHr ? `♥${l.avgHr}` : ""}</span>
                <span style={{ width: 44, textAlign: "right", fontFamily: "var(--mono)", fontSize: 11, color: C.faint }}>{l.gain != null ? `↑${l.gain}` : ""}</span>
              </div>
            ))}
          </div>
        </Panel>
      );
    }

    function ClimbDetail({ e }) {
      const sends = e.sends || [];
      return (
        <Panel style={{ marginBottom: 14 }}>
          <Eyebrow color={C.climb}>この日の課題（{sends.length}本）</Eyebrow>
          <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 7 }}>
            {sends.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, background: C.raised, borderRadius: 8, padding: "8px 11px" }}>
                <span style={{ fontFamily: "var(--mono)", fontWeight: 700, color: C.climb, width: 44 }}>{s.grade}</span>
                <span style={{ color: s.result === "プロジェクト" ? C.warn : C.good, width: 78, fontSize: 12 }}>{s.result}</span>
                <span style={{ color: C.faint, fontSize: 11.5, flex: 1 }}>{s.tags.join("・")}</span>
              </div>
            ))}
          </div>
        </Panel>
      );
    }

    /* ================================================================== *
     * DASHBOARD
     * ================================================================== */
    function DashTab({ entries, goals, settings }) {
      const load = useMemo(() => computeLoad(entries), [entries]);
      const weekly = useMemo(() => weeklySeries(entries), [entries]);
      const suggestions = useMemo(() => buildSuggestions(entries, goals || [], settings), [entries, goals, settings]);
      const st = acwrStatus(load.acwr);
      const bySport = useMemo(() => { const o = { run: 0, hike: 0, climb: 0 }; entries.filter((e) => daysBetween(e.date, today()) < 28).forEach((e) => { o[e.sport] += sessionLoad(e); }); return o; }, [entries]);
      const tot = bySport.run + bySport.hike + bySport.climb || 1;
      if (entries.length === 0) return <EmptyHint />;
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {suggestions.length > 0 && (
            <Panel style={{ borderColor: C.line2 }}>
              <Eyebrow color={C.text}>次にやること / WHAT'S NEXT</Eyebrow>
              <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 12 }}>
                {suggestions.map((s, i) => (
                  <div key={i} style={{ display: "flex", gap: 11 }}>
                    <span style={{ width: 7, height: 7, borderRadius: 4, background: s.color, marginTop: 6, flexShrink: 0 }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 14, fontWeight: 700 }}>{s.title}</span>
                        <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: s.color, border: `1px solid ${s.color}`, borderRadius: 4, padding: "1px 5px" }}>{s.tag}</span>
                      </div>
                      <div style={{ fontSize: 12.5, color: C.muted, marginTop: 3, lineHeight: 1.5 }}>{s.detail}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Panel>
          )}
          <Panel>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <Eyebrow>トレーニング負荷 / ACWR</Eyebrow><span style={{ fontSize: 12, fontWeight: 700, color: st.color }}>{st.label}</span>
            </div>
            <Gauge ratio={load.acwr} status={st} />
            <div style={{ display: "flex", justifyContent: "space-around", marginTop: 4 }}>
              <Stat label="急性(7日)" value={load.acute} sub="AU" />
              <Stat label="慢性(週平均)" value={load.chronic} sub="AU" />
              <Stat label="比率" value={load.acwr ? load.acwr.toFixed(2) : "—"} color={st.color} sub="0.8–1.3が目安" />
            </div>
            <div style={{ fontSize: 11, color: C.faint, marginTop: 10, lineHeight: 1.5 }}>負荷 = RPE × 時間（sRPE法）。ACWRは急性÷慢性で急増を検知する目安。</div>
          </Panel>
          <Panel>
            <Eyebrow>週間負荷（直近10週）</Eyebrow>
            <div style={{ height: 170, marginTop: 12 }}>
              <ResponsiveContainer><BarChart data={weekly} margin={{ top: 4, right: 4, left: -18, bottom: 0 }}>
                <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="week" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} />
                <Tooltip contentStyle={chartTip} cursor={{ fill: C.raised }} /><Bar dataKey="load" fill={C.info} radius={[4, 4, 0, 0]} />
              </BarChart></ResponsiveContainer>
            </div>
          </Panel>
          <Panel>
            <Eyebrow>競技バランス（直近28日の負荷）</Eyebrow>
            <div style={{ display: "flex", height: 14, borderRadius: 7, overflow: "hidden", margin: "14px 0 10px", background: C.raised }}>
              {Object.values(SPORTS).map((s) => { const w = (bySport[s.key] / tot) * 100; return w > 0 ? <div key={s.key} style={{ width: `${w}%`, background: s.color }} /> : null; })}
            </div>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              {Object.values(SPORTS).map((s) => <div key={s.key} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5 }}><span style={{ width: 9, height: 9, borderRadius: 3, background: s.color }} /><span style={{ color: C.muted }}>{s.label}</span><span style={{ fontFamily: "var(--mono)", color: C.text }}>{Math.round((bySport[s.key] / tot) * 100)}%</span></div>)}
            </div>
          </Panel>
          <SportTrends entries={entries} />
        </div>
      );
    }

    function Gauge({ ratio, status }) {
      const max = 2, cx = 100, cy = 100, r = 78, a0 = -135, a1 = 135, sweep = a1 - a0;
      const ang = (v) => a0 + (Math.max(0, Math.min(max, v)) / max) * sweep;
      const polar = (a) => { const rad = (a - 90) * Math.PI / 180; return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)]; };
      const arc = (s, e) => { const [x0, y0] = polar(s), [x1, y1] = polar(e); return `M ${x0} ${y0} A ${r} ${r} 0 ${e - s > 180 ? 1 : 0} 1 ${x1} ${y1}`; };
      const bands = [[a0, ang(0.8), C.info], [ang(0.8), ang(1.3), C.good], [ang(1.3), ang(1.5), C.warn], [ang(1.5), a1, C.bad]];
      const [nx, ny] = polar(ang(ratio));
      return (
        <div style={{ textAlign: "center", margin: "6px 0 0" }}>
          <svg width="200" height="138" viewBox="0 0 200 138">
            {bands.map(([s, e, col], i) => <path key={i} d={arc(s, e)} stroke={col} strokeWidth="11" fill="none" opacity={0.92} />)}
            {ratio > 0 && <><line x1={cx} y1={cy} x2={nx} y2={ny} stroke={C.text} strokeWidth="2.5" strokeLinecap="round" /><circle cx={cx} cy={cy} r="5" fill={C.text} /></>}
            <text x={cx} y={cy - 16} textAnchor="middle" fill={status.color} style={{ fontFamily: "var(--mono)", fontSize: 30, fontWeight: 700 }}>{ratio ? ratio.toFixed(2) : "—"}</text>
            <text x={polar(a0)[0] - 2} y={polar(a0)[1] + 16} textAnchor="middle" fill={C.faint} style={{ fontFamily: "var(--mono)", fontSize: 10 }}>0</text>
            <text x={polar(a1)[0] + 2} y={polar(a1)[1] + 16} textAnchor="middle" fill={C.faint} style={{ fontFamily: "var(--mono)", fontSize: 10 }}>2.0</text>
          </svg>
        </div>
      );
    }

    function SportTrends({ entries }) {
      const runs = entries.filter((e) => e.sport === "run");
      const hikes = entries.filter((e) => e.sport === "hike");
      const runWeekKm = useMemo(() => { const map = {}; runs.forEach((e) => { if (e.distance) { const w = weekStart(e.date); map[w] = (map[w] || 0) + e.distance; } }); let d = parseD(weekStart(today())); const out = []; for (let i = 0; i < 10; i++) { const k = d.toISOString().slice(0, 10); out.unshift({ week: k.slice(5), km: Math.round((map[k] || 0) * 10) / 10 }); d.setDate(d.getDate() - 7); } return out; }, [entries]);
      const hikeMonthElev = useMemo(() => { const map = {}; hikes.forEach((e) => { if (e.elevGain) { const m = monthKey(e.date); map[m] = (map[m] || 0) + e.elevGain; } }); return Object.keys(map).sort().slice(-8).map((m) => ({ month: m.slice(2), elev: map[m] })); }, [entries]);
      return (
        <>
          {runs.length > 0 && (
            <Panel><Eyebrow color={C.run}>ランニング — 週間距離</Eyebrow>
              <div style={{ height: 150, marginTop: 12 }}><ResponsiveContainer><BarChart data={runWeekKm} margin={{ top: 4, right: 4, left: -20, bottom: 0 }}>
                <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="week" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} />
                <Tooltip contentStyle={chartTip} cursor={{ fill: C.raised }} formatter={(v) => [`${v} km`, "距離"]} /><Bar dataKey="km" fill={C.run} radius={[4, 4, 0, 0]} />
              </BarChart></ResponsiveContainer></div>
            </Panel>
          )}
          {hikeMonthElev.length > 0 && (
            <Panel><Eyebrow color={C.hike}>登山 — 月別 累積標高</Eyebrow>
              <div style={{ height: 150, marginTop: 12 }}><ResponsiveContainer><BarChart data={hikeMonthElev} margin={{ top: 4, right: 4, left: -8, bottom: 0 }}>
                <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="month" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} width={44} />
                <Tooltip contentStyle={chartTip} cursor={{ fill: C.raised }} formatter={(v) => [`${v} m`, "獲得標高"]} /><Bar dataKey="elev" fill={C.hike} radius={[4, 4, 0, 0]} />
              </BarChart></ResponsiveContainer></div>
            </Panel>
          )}
          <ClimbProgress entries={entries} />
        </>
      );
    }

    function ClimbProgress({ entries }) {
      const [disc, setDisc] = useState("boulder");
      const sends = useMemo(() => { const o = []; entries.filter((e) => e.sport === "climb").forEach((e) => (e.sends || []).forEach((s) => { if (s.discipline === disc && s.result !== "プロジェクト") o.push({ ...s, date: e.date }); })); return o; }, [entries, disc]);
      const maxByDate = useMemo(() => { const map = {}; sends.forEach((s) => { map[s.date] = Math.max(map[s.date] ?? -1, s.idx); }); return Object.keys(map).sort().map((d) => ({ date: d.slice(5), idx: map[d] })); }, [entries, disc]);
      const has = entries.some((e) => e.sport === "climb" && (e.sends || []).length);
      if (!has) return null;
      return (
        <Panel>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Eyebrow color={C.climb}>クライミング — 最高グレード推移</Eyebrow>
            <div style={{ display: "flex", gap: 6 }}><Chip active={disc === "boulder"} color={C.climb} onClick={() => setDisc("boulder")}>ボルダー</Chip><Chip active={disc === "route"} color={C.climb} onClick={() => setDisc("route")}>ルート</Chip></div>
          </div>
          {maxByDate.length > 0 ? <div style={{ height: 160, marginTop: 12 }}><ResponsiveContainer><LineChart data={maxByDate} margin={{ top: 4, right: 8, left: -6, bottom: 0 }}>
            <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="date" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis tickFormatter={(v) => idxToLabel(disc, v)} tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} width={42} allowDecimals={false} />
            <Tooltip contentStyle={chartTip} formatter={(v) => [idxToLabel(disc, v), "最高"]} /><Line type="stepAfter" dataKey="idx" stroke={C.climb} strokeWidth={2} dot={{ r: 3, fill: C.climb }} />
          </LineChart></ResponsiveContainer></div> : <div style={{ color: C.faint, fontSize: 13, padding: 16, textAlign: "center" }}>この種目の完登記録がありません。</div>}
        </Panel>
      );
    }

    /* ================================================================== *
     * ANALYSIS
     * ================================================================== */
    function AnalysisTab({ entries, settings }) {
      if (entries.length === 0) return <EmptyHint />;
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <ClimbElo entries={entries} />
          <ClimbWeakness entries={entries} />
          <ClimbPyramid entries={entries} />
          <HrZones entries={entries} settings={settings} />
          <RunDynamics entries={entries} />
          <RunDistribution entries={entries} />
          <HikeAnalysis entries={entries} />
        </div>
      );
    }

    function ClimbElo({ entries }) {
      const [disc, setDisc] = useState("boulder");
      const { series, rating, n } = useMemo(() => eloSeries(entries, disc), [entries, disc]);
      if (!entries.some((e) => e.sport === "climb" && (e.sends || []).length)) return null;
      const equiv = idxToLabel(disc, (rating - 1000) / 100);
      return (
        <Panel>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Eyebrow color={C.climb}>クライミング — 実力レーティング (ELO)</Eyebrow>
            <div style={{ display: "flex", gap: 6 }}><Chip active={disc === "boulder"} color={C.climb} onClick={() => setDisc("boulder")}>ボルダー</Chip><Chip active={disc === "route"} color={C.climb} onClick={() => setDisc("route")}>ルート</Chip></div>
          </div>
          {n > 0 ? (<>
            <div style={{ display: "flex", alignItems: "baseline", gap: 12, margin: "12px 0 6px" }}>
              <span style={{ fontFamily: "var(--mono)", fontSize: 34, fontWeight: 700, color: C.climb }}>{rating}</span>
              <div><div style={{ fontSize: 13, color: C.text }}>相当グレード <b>{equiv}</b></div><div style={{ fontSize: 11, color: C.faint }}>{n} トライから推定</div></div>
            </div>
            <div style={{ height: 150, marginTop: 6 }}><ResponsiveContainer><LineChart data={series} margin={{ top: 4, right: 8, left: -8, bottom: 0 }}>
              <CartesianGrid stroke={C.line} vertical={false} /><XAxis dataKey="date" tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis domain={["dataMin-40", "dataMax+40"]} tick={{ fill: C.faint, fontSize: 10 }} tickLine={false} axisLine={false} width={40} />
              <Tooltip contentStyle={chartTip} formatter={(v) => [v, "ELO"]} /><Line type="monotone" dataKey="elo" stroke={C.climb} strokeWidth={2} dot={false} />
            </LineChart></ResponsiveContainer></div>
            <div style={{ fontSize: 11, color: C.faint, marginTop: 8, lineHeight: 1.5 }}>各課題を「自分 vs 課題難度」の対戦とみなし、完登=勝ち・敗退=負けでレートを更新（Eloモデル）。</div>
          </>) : <div style={{ color: C.faint, fontSize: 13, padding: 12, textAlign: "center" }}>この種目の記録がありません。</div>}
        </Panel>
      );
    }

    function ClimbWeakness({ entries }) {
      const data = useMemo(() => {
        const acc = {};
        entries.filter((e) => e.sport === "climb").forEach((e) => (e.sends || []).forEach((s) => { const done = s.result !== "プロジェクト"; s.tags.forEach((t) => { acc[t] = acc[t] || { tag: t, total: 0, done: 0 }; acc[t].total++; if (done) acc[t].done++; }); }));
        return Object.values(acc).map((x) => ({ ...x, rate: Math.round((x.done / x.total) * 100) })).sort((a, b) => a.rate - b.rate);
      }, [entries]);
      if (data.length === 0) return <Panel><Eyebrow color={C.climb}>スタイル別 弱点</Eyebrow><div style={{ color: C.faint, fontSize: 13, marginTop: 10 }}>課題にスタイルタグを付けて記録すると、得意・苦手が見えます。</div></Panel>;
      const weak = data[0];
      return (
        <Panel>
          <Eyebrow color={C.climb}>スタイル別 完登率</Eyebrow>
          <div style={{ fontSize: 13, color: C.muted, margin: "8px 0 12px" }}>いま最も苦手なのは <span style={{ color: C.bad, fontWeight: 700 }}>{weak.tag}</span>（{weak.rate}%）。</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {data.map((d) => { const col = d.rate < 40 ? C.bad : d.rate < 70 ? C.warn : C.good; return (
              <div key={d.tag} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 92, fontSize: 12.5 }}>{d.tag}</span>
                <div style={{ flex: 1, height: 10, background: C.raised, borderRadius: 6, overflow: "hidden" }}><div style={{ width: `${d.rate}%`, height: "100%", background: col, borderRadius: 6 }} /></div>
                <span style={{ width: 58, textAlign: "right", fontFamily: "var(--mono)", fontSize: 12, color: col }}>{d.rate}%<span style={{ color: C.faint }}> ·{d.total}</span></span>
              </div>); })}
          </div>
        </Panel>
      );
    }

    function ClimbPyramid({ entries }) {
      const [disc, setDisc] = useState("boulder");
      const sends = useMemo(() => { const o = []; entries.filter((e) => e.sport === "climb").forEach((e) => (e.sends || []).forEach((s) => { if (s.discipline === disc && s.result !== "プロジェクト") o.push(s); })); return o; }, [entries, disc]);
      const data = useMemo(() => { const m = {}; sends.forEach((s) => { m[s.idx] = m[s.idx] || { idx: s.idx, grade: s.grade, count: 0 }; m[s.idx].count++; }); return Object.values(m).sort((a, b) => a.idx - b.idx); }, [entries, disc]);
      const flash = sends.filter((s) => s.result === "フラッシュ" || s.result === "オンサイト").length;
      if (!entries.some((e) => e.sport === "climb" && (e.sends || []).length)) return null;
      return (
        <Panel>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Eyebrow color={C.climb}>グレードピラミッド</Eyebrow>
            <div style={{ display: "flex", gap: 6 }}><Chip active={disc === "boulder"} color={C.climb} onClick={() => setDisc("boulder")}>ボルダー</Chip><Chip active={disc === "route"} color={C.climb} onClick={() => setDisc("route")}>ルート</Chip></div>
          </div>
          {data.length > 0 ? (<>
            <div style={{ height: Math.max(120, data.length * 30), marginTop: 12 }}><ResponsiveContainer><BarChart layout="vertical" data={[...data].reverse()} margin={{ top: 0, right: 14, left: 6, bottom: 0 }}>
              <XAxis type="number" hide allowDecimals={false} /><YAxis type="category" dataKey="grade" tick={{ fill: C.text, fontSize: 11, fontFamily: "var(--mono)" }} tickLine={false} axisLine={false} width={48} />
              <Tooltip contentStyle={chartTip} cursor={{ fill: C.raised }} formatter={(v) => [`${v} 本`, "完登"]} /><Bar dataKey="count" fill={C.climb} radius={[0, 4, 4, 0]} label={{ fill: C.muted, fontSize: 11, position: "right" }} />
            </BarChart></ResponsiveContainer></div>
            <div style={{ display: "flex", gap: 24, marginTop: 4 }}><Stat label="総完登" value={sends.length} sub="本" /><Stat label="一撃率" value={`${sends.length ? Math.round((flash / sends.length) * 100) : 0}%`} sub="フラッシュ/OS" color={C.climb} /></div>
          </>) : <div style={{ color: C.faint, fontSize: 13, padding: 16, textAlign: "center" }}>完登記録がありません。</div>}
        </Panel>
      );
    }

    function HrZones({ entries, settings }) {
      const data = useMemo(() => {
        const secs = [0, 0, 0, 0, 0];
        entries.filter((e) => e.sport === "run" && e.metrics?.hrSeries && daysBetween(e.date, today()) < 120).forEach((e) => { zonesFromSeries(e.metrics.hrSeries, e.metrics.hrSeriesSec, settings.maxHr).forEach((s, i) => secs[i] += s); });
        const tot = secs.reduce((a, b) => a + b, 0);
        return { rows: ZONE_DEFS.map((z, i) => ({ ...z, secs: secs[i], pct: tot ? Math.round((secs[i] / tot) * 100) : 0 })), tot };
      }, [entries, settings]);
      if (data.tot === 0) return null;
      const lowPct = data.rows[0].pct + data.rows[1].pct;
      return (
        <Panel>
          <Eyebrow color={C.run}>心拍ゾーン分布（直近120日・最大{settings.maxHr}）</Eyebrow>
          <div style={{ fontSize: 13, color: C.muted, margin: "8px 0 12px" }}>低強度(Z1-2) <span style={{ fontFamily: "var(--mono)", color: lowPct >= 75 ? C.good : C.warn, fontWeight: 700 }}>{lowPct}%</span>。{lowPct >= 75 ? "土台づくりに良い配分です。" : "中強度に偏りがち。イージーを増やすと故障予防に。"}</div>
          <div style={{ display: "flex", height: 16, borderRadius: 8, overflow: "hidden", marginBottom: 12, background: C.raised }}>
            {data.rows.map((z) => z.pct > 0 ? <div key={z.l} style={{ width: `${z.pct}%`, background: z.c }} /> : null)}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {data.rows.map((z) => (
              <div key={z.l} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12.5 }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: z.c }} />
                <span style={{ width: 24, fontFamily: "var(--mono)", color: z.c }}>{z.l}</span>
                <span style={{ color: C.muted, width: 64 }}>{z.name}</span>
                <div style={{ flex: 1, height: 8, background: C.raised, borderRadius: 5, overflow: "hidden" }}><div style={{ width: `${z.pct}%`, height: "100%", background: z.c }} /></div>
                <span style={{ width: 60, textAlign: "right", fontFamily: "var(--mono)", color: C.text }}>{z.pct}% <span style={{ color: C.faint }}>{Math.round(z.secs / 60)}分</span></span>
              </div>
            ))}
          </div>
        </Panel>
      );
    }

    function RunDynamics({ entries }) {
      const runs = useMemo(() => entries.filter((e) => e.sport === "run" && e.metrics).sort((a, b) => (a.date < b.date ? -1 : 1)), [entries]);
      if (runs.length === 0) return (
        <Panel><Eyebrow color={C.run}>ランニング・ダイナミクス</Eyebrow>
